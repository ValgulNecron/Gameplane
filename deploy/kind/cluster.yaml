# kind cluster for Gameplane local development.
#
# Three-node cluster so the operator can exercise multi-node scheduling
# (node affinity, anti-affinity, NodePort advertisement). Single-node
# mode can be tested with `kind create cluster --name gameplane-dev-single`.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gameplane-dev
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
# Use the per-host registries.d layout so the kind cluster picks up
# `kind-registry:5000` after deploy/kind/up.sh attaches the registry
# container to kind's docker network.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Gameplane dashboard / API via ingress
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
      # Default Minecraft NodePort used by the sample GameServer
      - containerPort: 30565
        hostPort: 30565
        protocol: TCP
  - role: worker
  - role: worker
