apiVersion: apps/v1
kind: Deployment
metadata:
  name: kestrel-operator
  namespace: kestrel-system
  labels:
    app.kubernetes.io/name: kestrel-operator
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kestrel-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kestrel-operator
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: kestrel-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/kestrel/operator:dev
          args:
            - "--leader-elect"
            - "--health-probe-bind-address=:8081"
            - "--metrics-bind-address=:8080"
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
