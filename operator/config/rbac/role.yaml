---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - pods
  - pods/log
  - secrets
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kestrel.gg
  resources:
  - backups
  - backupschedules
  - gametemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kestrel.gg
  resources:
  - backups/status
  - backupschedules/status
  - gameservers/status
  - gametemplates/status
  - restores/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - kestrel.gg
  resources:
  - gameservers
  - restores
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kestrel.gg
  resources:
  - gameservers/finalizers
  verbs:
  - update
