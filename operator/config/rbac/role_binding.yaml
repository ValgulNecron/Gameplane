apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gameplane-operator-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gameplane-operator-manager
subjects:
  - kind: ServiceAccount
    name: gameplane-operator
    namespace: gameplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gameplane-operator-leader-election
  namespace: gameplane-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gameplane-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: gameplane-operator
    namespace: gameplane-system
