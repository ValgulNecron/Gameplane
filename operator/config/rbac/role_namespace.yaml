# Namespace-scoped writes for the operator. This pairs with the tight
# ClusterRole in role.yaml (reads only) and grants the mutating verbs
# the operator actually needs — but only in the games namespace.
#
# A production Helm install binds an equivalent Role in each managed
# namespace (see charts/gameplane/templates/operator.yaml). This file
# exists so `kubectl apply -f operator/config/rbac/` works for local
# dev without regressing to cluster-wide write grants.
#
# If you deploy to additional games namespaces, duplicate this file
# (or run kustomize) with the namespace field updated.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gameplane-operator-manage
  namespace: gameplane-games
rules:
  - apiGroups: ["gameplane.local"]
    resources:
      - gameservers
      - backups
      - backupschedules
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - services
      - persistentvolumeclaims
      - configmaps
      - secrets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # softStop writes the module-declared stop sequence to a consoleMode:
  # pty game's stdin via this subresource when it has no RCON to run the
  # sequence over instead. Namespace-scoped only: game pods only ever
  # exist here, and pods/attach create is exec-equivalent.
  - apiGroups: [""]
    resources: ["pods/attach"]
    verbs: ["create"]
  # Per-GameServer agent identity: SA + heartbeat Role/RoleBinding
  # (resourceNames-scoped to one GameServer's status subresource).
  # Granting gameservers/status passes the RBAC escalation check because
  # the operator's ClusterRole already holds that permission.
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CSI VolumeSnapshots for the volume-snapshot backup strategy.
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gameplane-operator-manage
  namespace: gameplane-games
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gameplane-operator-manage
subjects:
  - kind: ServiceAccount
    name: gameplane-operator
    namespace: gameplane-system
