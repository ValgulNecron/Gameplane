apiVersion: gameplane.gg/v1alpha1
kind: BackupSchedule
metadata:
  name: smp-01-every-6h
  namespace: gameplane-games
spec:
  serverRef:
    name: smp-01
  schedule: "0 */6 * * *"
  repoRef:
    name: gameplane-backup-repo
    key: url
  strategy: restic-snapshot
  quiesce: true
  retention:
    keepLast: 12
    keepDaily: 7
    keepWeekly: 4
  concurrencyPolicy: Forbid
