---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: backupschedules.gameplane.local
spec:
  group: gameplane.local
  names:
    kind: BackupSchedule
    listKind: BackupScheduleList
    plural: backupschedules
    shortNames:
    - bks
    singular: backupschedule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serverRef.name
      name: Server
      type: string
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .spec.suspend
      name: Suspended
      type: boolean
    - jsonPath: .status.lastSuccessfulTime
      name: Last
      type: date
    - jsonPath: .status.nextScheduleTime
      name: Next
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BackupSchedule describes a recurring backup policy for a single
          GameServer. The operator creates Backup objects according to the
          schedule and prunes them according to the retention policy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BackupScheduleSpec defines a recurring backup policy for
              a GameServer.
            properties:
              concurrencyPolicy:
                default: Forbid
                description: |-
                  ConcurrencyPolicy controls what happens when a new backup is due
                  while a previous one is still running.
                enum:
                - Allow
                - Forbid
                - Replace
                type: string
              quiesce:
                default: true
                description: |-
                  Quiesce mirrors BackupSpec.Quiesce.

                  No `omitempty`: the CRD default is true, so an `omitempty` tag would
                  let the typed client silently drop an explicit `false` on the wire
                  (Go's zero value for bool), and the apiserver would re-apply the
                  `true` default — silently re-enabling quiesce for a schedule that
                  explicitly disabled it (backupschedule_controller.go's fire() copies
                  this value into each Backup it creates via the typed client). Do not
                  add it back.
                type: boolean
              repoRef:
                description: |-
                  RepoRef is the restic repository credentials Secret. Required for the
                  restic-snapshot strategy; omit for volume-snapshot (CSI snapshots need
                  no restic repo).
                properties:
                  key:
                    minLength: 1
                    type: string
                  name:
                    minLength: 1
                    type: string
                required:
                - key
                - name
                type: object
              retention:
                description: |-
                  Retention controls which past backups are kept. Unset means keep
                  everything (not recommended in production).
                properties:
                  keepDaily:
                    format: int32
                    type: integer
                  keepHourly:
                    format: int32
                    type: integer
                  keepLast:
                    format: int32
                    type: integer
                  keepMonthly:
                    format: int32
                    type: integer
                  keepWeekly:
                    format: int32
                    type: integer
                  keepYearly:
                    format: int32
                    type: integer
                type: object
              schedule:
                description: |-
                  Schedule is a standard cron expression in the cluster's timezone.
                  Five-field form (no seconds). The Pattern is a structural guard
                  against typos like "every-night"; the controller uses
                  robfig/cron/v3 to parse for actual validity and surfaces a
                  failed condition on any expression that's well-formed but
                  uninterpretable. The optional sixth token tolerates the
                  seconds-prefix dialect.
                minLength: 9
                pattern: ^\S+\s+\S+\s+\S+\s+\S+\s+\S+(\s+\S+)?$
                type: string
              serverRef:
                description: ServerRef is the GameServer to back up on this schedule.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              startingDeadlineSeconds:
                description: |-
                  StartingDeadlineSeconds caps how late a missed schedule can start.
                  Matches CronJob semantics.
                format: int64
                type: integer
              strategy:
                default: restic-snapshot
                description: Strategy mirrors BackupSpec.Strategy.
                enum:
                - restic-snapshot
                - volume-snapshot
                type: string
              suspend:
                default: false
                description: Suspend pauses the schedule without deleting it.
                type: boolean
            required:
            - schedule
            - serverRef
            type: object
            x-kubernetes-validations:
            - message: repoRef is required for the restic-snapshot strategy
              rule: self.strategy == 'volume-snapshot' || has(self.repoRef)
          status:
            description: BackupScheduleStatus is the observed state of a BackupSchedule.
            properties:
              active:
                description: Active lists in-flight Backup objects owned by this schedule.
                items:
                  description: ObjectReference contains enough information to let
                    you inspect or modify the referred object.
                  properties:
                    apiVersion:
                      description: API version of the referent.
                      type: string
                    fieldPath:
                      description: |-
                        If referring to a piece of an object instead of an entire object, this string
                        should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                        For example, if the object reference is to a container within a pod, this would take on a value like:
                        "spec.containers{name}" (where "name" refers to the name of the container that triggered
                        the event) or if no container name is specified "spec.containers[2]" (container with
                        index 2 in this pod). This syntax is chosen only to have some well-defined way of
                        referencing a part of an object.
                      type: string
                    kind:
                      description: |-
                        Kind of the referent.
                        More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                      type: string
                    name:
                      description: |-
                        Name of the referent.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                    namespace:
                      description: |-
                        Namespace of the referent.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                      type: string
                    resourceVersion:
                      description: |-
                        Specific resourceVersion to which this reference is made, if any.
                        More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                      type: string
                    uid:
                      description: |-
                        UID of the referent.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              conditions:
                description: Conditions carry detailed state transitions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastScheduleTime:
                format: date-time
                type: string
              lastSuccessfulTime:
                format: date-time
                type: string
              nextScheduleTime:
                description: |-
                  NextScheduleTime is computed from Spec.Schedule and surfaced in
                  the dashboard.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
