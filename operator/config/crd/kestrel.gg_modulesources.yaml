---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: modulesources.kestrel.gg
spec:
  group: kestrel.gg
  names:
    kind: ModuleSource
    listKind: ModuleSourceList
    plural: modulesources
    shortNames:
    - msrc
    - modsource
    singular: modulesource
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.conditions[?(@.type=="Synced")].status
      name: Synced
      type: string
    - jsonPath: .status.lastSync
      name: Last Sync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ModuleSource is a store that Kestrel pulls module bundles from.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ModuleSourceSpec configures one store that hosts Kestrel modules. The
              spec is a discriminated union: exactly the nested config matching
              spec.type must be set (enforced by CEL rules below). The operator
              periodically indexes the source and caches the resulting catalog into
              status.modules.
            properties:
              allow:
                description: |-
                  Allow restricts which discovered module names this source exposes.
                  Entries are exact names or path.Match globs (e.g. "minecraft-*").
                  Empty means every discovered module. For oci sources the explicit
                  spec.oci.modules list is authoritative; allow filters on top of it.
                items:
                  type: string
                type: array
              git:
                description: Git configures a git-type source.
                properties:
                  ref:
                    default: main
                    description: Ref is the branch or tag to index. Defaults to main.
                    type: string
                  secretRef:
                    description: |-
                      SecretRef references a Secret in the operator namespace holding
                      credentials: either "token" (or "username"+"password") for https,
                      or "ssh-privatekey" (+ optional "known_hosts") for ssh.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  subPath:
                    description: |-
                      SubPath limits scanning to a subdirectory of the repository
                      (e.g. "modules"). Must be relative and must not contain "..".
                    type: string
                    x-kubernetes-validations:
                    - message: subPath must be relative and must not contain '..'
                      rule: '!self.startsWith(''/'') && !self.contains(''..'')'
                  url:
                    description: URL is the clone URL (https://... or ssh://git@...).
                    minLength: 1
                    type: string
                required:
                - url
                type: object
              http:
                description: HTTP configures an http-type source.
                properties:
                  insecure:
                    description: |-
                      Insecure allows plain http URLs. TLS verification is never
                      skipped — for self-signed registries mount the CA into the
                      operator's trust store.
                    type: boolean
                  secretRef:
                    description: |-
                      SecretRef references a Secret in the operator namespace holding
                      "token" (sent as a bearer token) or "username"+"password" (basic
                      auth).
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  url:
                    description: URL of the archive (.tar.gz/.tgz/.zip).
                    minLength: 1
                    type: string
                required:
                - url
                type: object
              local:
                description: Local configures a local-type source.
                properties:
                  path:
                    description: |-
                      Path is resolved relative to the operator's --module-local-root.
                      Empty scans the root itself. Must be relative and must not
                      contain "..".
                    type: string
                    x-kubernetes-validations:
                    - message: path must be relative and must not contain '..'
                      rule: '!self.startsWith(''/'') && !self.contains(''..'')'
                type: object
              oci:
                description: OCI configures an oci-type source.
                properties:
                  insecure:
                    description: |-
                      Insecure allows plain HTTP and skips TLS verification. Intended
                      for local kind/k3d registries; do not enable on production
                      clusters.
                    type: boolean
                  modules:
                    description: Modules is the explicit list of modules served by
                      this source.
                    items:
                      description: |-
                        ModuleRef identifies a module within a ModuleSource by its logical
                        name. For oci sources the full reference is reconstructed as
                        "<oci.url>/<name>".
                      properties:
                        name:
                          description: |-
                            Name is the module identifier within this source. Must match the
                            "name" field in the bundle's module.yaml.
                          minLength: 1
                          type: string
                      required:
                      - name
                      type: object
                    minItems: 1
                    type: array
                  pullSecretRef:
                    description: |-
                      PullSecretRef references a kubernetes.io/dockerconfigjson Secret
                      in the operator namespace. Used for private registries.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  url:
                    description: |-
                      URL is the registry/repository prefix that holds module bundles
                      (e.g. "ghcr.io/kestrel-gg/modules").
                    minLength: 1
                    type: string
                required:
                - modules
                - url
                type: object
              refreshInterval:
                default: 1h
                description: |-
                  RefreshInterval is how often the controller re-indexes the
                  source. Defaults to 1h. Minimum 1m.
                type: string
              type:
                default: oci
                description: |-
                  Type selects where this source pulls modules from:
                    - oci:    an OCI registry holding module bundle artifacts
                    - git:    a git repository containing module directories
                    - http:   an http(s) URL to a tar.gz/zip of module directories
                    - local:  a directory mounted into the operator pod
                    - upload: bundles uploaded through the API, stored as labeled
                              ConfigMaps in the operator namespace (no config)
                enum:
                - oci
                - git
                - http
                - local
                - upload
                type: string
            type: object
            x-kubernetes-validations:
            - message: spec.oci is required when spec.type is oci
              rule: self.type != 'oci' || has(self.oci)
            - message: spec.git is required when spec.type is git
              rule: self.type != 'git' || has(self.git)
            - message: spec.http is required when spec.type is http
              rule: self.type != 'http' || has(self.http)
            - message: spec.local is required when spec.type is local
              rule: self.type != 'local' || has(self.local)
            - message: spec.oci is only valid when spec.type is oci
              rule: '!has(self.oci) || self.type == ''oci'''
            - message: spec.git is only valid when spec.type is git
              rule: '!has(self.git) || self.type == ''git'''
            - message: spec.http is only valid when spec.type is http
              rule: '!has(self.http) || self.type == ''http'''
            - message: spec.local is only valid when spec.type is local
              rule: '!has(self.local) || self.type == ''local'''
          status:
            description: |-
              ModuleSourceStatus is populated by the operator from a successful
              source index.
            properties:
              conditions:
                description: |-
                  Conditions tracks Synced (last index attempt succeeded) and Ready
                  (a complete catalog is available).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastSync:
                description: LastSync is the time of the most recent successful index
                  pull.
                format: date-time
                type: string
              modules:
                description: Modules is the cached catalog for this source.
                items:
                  description: |-
                    ModuleEntry is one module's catalog snapshot from the source. The
                    operator fills these from each module's module.yaml (+ tag list for
                    oci sources).
                  properties:
                    digest:
                      description: |-
                        Digest identifies the exact content backing LatestVersion: the
                        OCI manifest digest, "git:<commit sha>", or a sha256 content hash
                        over the module directory. Lets installs detect content drift
                        when a version string is reused.
                      type: string
                    displayName:
                      description: DisplayName is the human-readable label from module.yaml.
                      type: string
                    game:
                      description: Game is the game-family identifier from module.yaml.
                      type: string
                    icon:
                      description: |-
                        Icon is either a relative filename (resolved against the bundle)
                        or a URL/data URI passed straight through to the UI.
                      type: string
                    latestVersion:
                      description: LatestVersion is Versions[0] when populated.
                      type: string
                    name:
                      description: Name is the logical module name.
                      type: string
                    reference:
                      description: |-
                        Reference locates this module within its source: the registry
                        repo path for oci (e.g. "ghcr.io/kestrel-gg/modules/minecraft-java"),
                        or "<type>:<location>/<dir>" for the other source types.
                      type: string
                    summary:
                      description: Summary is the one-line catalog blurb from module.yaml.
                      type: string
                    versions:
                      description: |-
                        Versions lists the available versions, semver-sorted descending.
                        For oci these are the registry tags; non-oci sources publish a
                        single version — whatever module.yaml declares.
                      items:
                        type: string
                      type: array
                  required:
                  - name
                  - reference
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
