---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: backups.gameplane.local
spec:
  group: gameplane.local
  names:
    kind: Backup
    listKind: BackupList
    plural: backups
    shortNames:
    - bk
    singular: backup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serverRef.name
      name: Server
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.size
      name: Size
      type: string
    - jsonPath: .status.completionTime
      name: Completed
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Backup represents a one-shot backup of a GameServer's data volume.
          Recurring backups are expressed as BackupSchedules, which create
          Backup objects over time.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BackupSpec is the desired state of a one-shot backup.
            properties:
              quiesce:
                default: true
                description: |-
                  Quiesce, when true, asks the agent to flush/pause the game before
                  the snapshot (via RCON "save-all" or game-specific hook) and
                  resume after. Requires an agent that supports the game.

                  No `omitempty`: the CRD default is true, so an `omitempty` tag would
                  let the typed client silently drop an explicit `false` on the wire
                  (Go's zero value for bool), and the apiserver would re-apply the
                  `true` default — silently re-enabling quiesce for a user/schedule
                  that explicitly disabled it. Do not add it back.
                type: boolean
              repoRef:
                description: |-
                  RepoRef points at a Secret containing the restic repository URL
                  and credentials. See docs for the expected key layout. Required for
                  the restic-snapshot strategy; ignored (and may be omitted) for
                  volume-snapshot, which captures a CSI snapshot instead of using restic.
                properties:
                  key:
                    minLength: 1
                    type: string
                  name:
                    minLength: 1
                    type: string
                required:
                - key
                - name
                type: object
              serverRef:
                description: ServerRef is the GameServer whose data volume should
                  be backed up.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              strategy:
                default: restic-snapshot
                description: |-
                  Strategy controls how the data is captured.
                  - "restic-snapshot" (default): run restic against the PVC mount
                  - "volume-snapshot": use a CSI VolumeSnapshot instead of restic
                enum:
                - restic-snapshot
                - volume-snapshot
                type: string
              tags:
                description: Tags are attached to the restic snapshot for filtering.
                items:
                  type: string
                type: array
              volumeSnapshotClassName:
                description: |-
                  VolumeSnapshotClassName names the VolumeSnapshotClass to use when
                  Strategy=volume-snapshot. Empty selects the cluster's default
                  snapshot class. Ignored for restic-snapshot.
                maxLength: 253
                type: string
            required:
            - serverRef
            type: object
            x-kubernetes-validations:
            - message: repoRef is required for the restic-snapshot strategy
              rule: self.strategy == 'volume-snapshot' || has(self.repoRef)
          status:
            description: BackupStatus is the observed state of a Backup.
            properties:
              completionTime:
                format: date-time
                type: string
              conditions:
                description: Conditions carry detailed state transitions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              message:
                description: Message is a human-readable reason when Phase=Failed.
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: BackupPhase is a high-level state for a Backup job.
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              size:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  Size is the on-disk size of the snapshot, as reported by the
                  backup driver. Not always exact for incremental snapshots.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              snapshotID:
                description: |-
                  SnapshotID is the restic snapshot ID (or CSI VolumeSnapshot name)
                  for use in restore operations.
                type: string
              startTime:
                description: StartTime / CompletionTime bracket the actual backup
                  run.
                format: date-time
                type: string
              volumeSnapshotContentName:
                description: |-
                  VolumeSnapshotContentName is the cluster-scoped VolumeSnapshotContent
                  bound to status.snapshotID, recorded once the VolumeSnapshot reports
                  readyToUse. Restore checks it to confirm the snapshot actually bound
                  before standing up a new server. Empty for restic-snapshot backups.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
