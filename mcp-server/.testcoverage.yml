# Coverage threshold gate for the mcp-server module.
# Enforced by `make cover-go-check` via go-test-coverage/v2.
#
# The server is a thin, strictly read-only MCP tool surface: the tests cover
# tool registration (including the read-only invariant — no mutating verb
# ever appears in the registered tool set), the CRD/pod/event/log client
# helpers against fake clientsets, and propose_fix's heuristic advice text.
# The uncovered remainder is main()/run() process wiring (stdio transport +
# signal handling), which isn't unit-testable. Gate below measured; ratchet
# up as coverage grows.
profile: coverage/unit.out
github-action-output: false

threshold:
  file: 0
  package: 0
  total: 70
