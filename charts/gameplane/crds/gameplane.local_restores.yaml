---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: restores.gameplane.local
spec:
  group: gameplane.local
  names:
    kind: Restore
    listKind: RestoreList
    plural: restores
    shortNames:
    - rs
    singular: restore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backupRef.name
      name: Backup
      type: string
    - jsonPath: .spec.serverRef.name
      name: Server
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.completionTime
      name: Completed
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Restore represents a one-shot restore of a Backup's snapshot into a
          GameServer's data volume. The target server is suspended for the
          duration of the restore Job and resumed on success.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RestoreSpec is the desired state of a one-shot restore.
            properties:
              backupRef:
                description: |-
                  BackupRef is the source Backup. Must live in the same namespace
                  and have status.phase=Succeeded with a non-empty snapshotID.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              serverRef:
                description: |-
                  ServerRef is the target GameServer.

                  For restic-snapshot backups the target must already exist; it is
                  suspended and its data volume is overwritten in place (it may be a
                  pre-created empty server, restoring into a fresh server).

                  For volume-snapshot backups the target must NOT already exist: the
                  restore provisions a brand-new GameServer under this name, copying
                  the original server's spec and seeding its data volume from the CSI
                  snapshot. The original server is never touched.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - backupRef
            - serverRef
            type: object
          status:
            description: RestoreStatus is the observed state of a Restore.
            properties:
              completionTime:
                format: date-time
                type: string
              conditions:
                description: Conditions carry detailed state transitions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              message:
                description: Message is a human-readable reason when Phase=Failed.
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: RestorePhase is a high-level state for a Restore job.
                enum:
                - Pending
                - Suspending
                - Running
                - Resuming
                - Succeeded
                - Failed
                type: string
              snapshotID:
                description: |-
                  SnapshotID is the restic snapshot used. Resolved from the
                  referenced Backup at Pending → Suspending transition and pinned
                  here so retention can't surprise us mid-run.
                type: string
              startTime:
                description: StartTime / CompletionTime bracket the actual restore
                  Job.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
