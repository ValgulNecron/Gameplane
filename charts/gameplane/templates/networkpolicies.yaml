{{- if .Values.networkPolicies.enabled }}
# Default-deny ingress in the games namespace. Individual GameServers
# open only the ports declared in their template (and whatever the
# operator surfaces via the backing Service / Ingress).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress: []
---
# Default-deny egress. This rule opens only DNS; outbound access to the
# public internet (game binary / asset / mod downloads) is granted by the
# allow-game-public-egress policy below, and apiserver access by
# allow-agent-to-apiserver. Operators can add further game-specific allow
# policies as needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# Allow the agent sidecar to reach the kube-apiserver for its status
# heartbeat (gameservers/status patches). Service VIP traffic is DNATed
# to the apiserver endpoint before policy evaluation on most CNIs, so an
# ipBlock toward the endpoint address is required; like the kubelet
# probes policy below, default to RFC1918 + link-local and let operators
# narrow it via networkPolicies.apiServerCIDRs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agent-to-apiserver
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gameplane-game
  policyTypes: [Egress]
  egress:
    - to:
        {{- $apiCidrs := (.Values.networkPolicies.apiServerCIDRs | default (list)) }}
        {{- if $apiCidrs }}
        {{- range $apiCidrs }}
        - ipBlock: { cidr: {{ . | quote }} }
        {{- end }}
        {{- else }}
        - ipBlock: { cidr: 10.0.0.0/8 }
        - ipBlock: { cidr: 172.16.0.0/12 }
        - ipBlock: { cidr: 192.168.0.0/16 }
        - ipBlock: { cidr: 169.254.0.0/16 }
        {{- end }}
      ports:
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 6443 }
---
# Allow the API and operator pods (in the system namespace) to reach
# every game pod's agent on port 8090. The API proxies console/files/
# logs/players traffic; the operator calls /quiesce before backups.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-agent
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gameplane-game
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gameplane-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gameplane-operator
      ports:
        - { protocol: TCP, port: 8090 }
---
# Allow probe traffic from kubelet. Source IP depends on the CNI; by
# default we scope to RFC1918 + link-local, which covers most single-
# cluster installs without opening the public internet. Operators on
# clusters where nodes sit outside those ranges should set
# networkPolicies.kubeletCIDRs explicitly.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubelet-probes
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gameplane-game
  policyTypes: [Ingress]
  ingress:
    - from:
        {{- $cidrs := (.Values.networkPolicies.kubeletCIDRs | default (list)) }}
        {{- if $cidrs }}
        {{- range $cidrs }}
        - ipBlock: { cidr: {{ . | quote }} }
        {{- end }}
        {{- else }}
        - ipBlock: { cidr: 10.0.0.0/8 }
        - ipBlock: { cidr: 172.16.0.0/12 }
        - ipBlock: { cidr: 192.168.0.0/16 }
        - ipBlock: { cidr: 169.254.0.0/16 }
        {{- end }}
      ports:
        - { protocol: TCP, port: 8090 }
{{- if .Values.networkPolicies.gameEgress.enabled }}
---
# Allow game pods to reach the public internet for binary/asset/mod
# downloads on startup. Without this, the default-deny egress policy
# above blocks the download and the server hangs in "Starting" forever.
# Private ranges are excepted so game pods still can't reach in-cluster
# services or link-local metadata (anti-SSRF / tenant isolation).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-game-public-egress
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gameplane-game
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              {{- range .Values.networkPolicies.gameEgress.privateCIDRs }}
              - {{ . | quote }}
              {{- end }}
      ports:
        {{- range .Values.networkPolicies.gameEgress.ports }}
        - { protocol: {{ .protocol }}, port: {{ .port }} }
        {{- end }}
{{- end }}
{{- end }}
