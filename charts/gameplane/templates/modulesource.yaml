{{- if .Values.defaultModuleSource.enabled }}
{{- $src := .Values.defaultModuleSource }}
{{- $type := $src.type | default "oci" }}
apiVersion: gameplane.local/v1alpha1
kind: ModuleSource
metadata:
  name: {{ $src.name | default "default" }}
  labels:
    {{- include "gameplane.labels" . | nindent 4 }}
spec:
  type: {{ $type }}
  refreshInterval: {{ $src.refreshInterval | default "1h" }}
  {{- if eq $type "git" }}
  git:
    url: {{ $src.git.url | quote }}
    ref: {{ $src.git.ref | default "main" | quote }}
    {{- with $src.git.subPath }}
    subPath: {{ . | quote }}
    {{- end }}
  {{- else if eq $type "oci" }}
  oci:
    url: {{ $src.oci.url | quote }}
    insecure: {{ $src.oci.insecure | default false }}
    modules:
      {{- range $src.oci.modules }}
      - name: {{ . | quote }}
      {{- end }}
    {{- with $src.oci.pullSecretName }}
    pullSecretRef:
      name: {{ . | quote }}
    {{- end }}
  {{- if $src.oci.verify.enabled }}
  verify:
    key:
      name: gameplane-module-cosign-pub
  {{- end }}
  {{- else }}
  {{- fail (printf "defaultModuleSource.type must be \"git\" or \"oci\", got %q" $type) }}
  {{- end }}
{{- end }}
{{- if .Values.uploadModuleSource.enabled }}
---
apiVersion: gameplane.local/v1alpha1
kind: ModuleSource
metadata:
  name: {{ .Values.uploadModuleSource.name | default "uploads" }}
  labels:
    {{- include "gameplane.labels" . | nindent 4 }}
spec:
  type: upload
  refreshInterval: {{ .Values.uploadModuleSource.refreshInterval | default "1h" }}
{{- end }}
