{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gameplane
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # All traffic enters the web pod, which serves the SPA and proxies
          # API/WS/SSE to gameplane-api (see web/nginx.conf.template). If the
          # web front end is disabled, fall back to the API directly — it
          # serves the API surface, just not the dashboard at /.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ if .Values.web.enabled }}gameplane-web{{ else }}gameplane-api{{ end }}
                port: { name: http }
  {{- if .Values.ingress.tls }}
  tls:
    - hosts: [{{ .Values.ingress.host }}]
      secretName: gameplane-tls
  {{- end }}
{{- end }}
