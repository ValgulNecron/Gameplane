{{- if .Values.web.enabled }}
# The dashboard front end: an nginx pod that serves the built SPA and reverse-
# proxies API/WebSocket/SSE traffic to gameplane-api. The ingress points at
# THIS service (not the API), so `helm install` yields a working dashboard
# with no external build step.
#
# Why front the API instead of an ingress path-split: the SPA calls the API
# at unprefixed paths (/servers, /users/me, …) and several of those are also
# client-side routes, disambiguated only by the Accept header — which a
# Prefix-based ingress rule can't see. nginx does that split (see
# web/nginx.conf.template); a new API route needs no change here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gameplane-web
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/name: gameplane-web }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gameplane-web
        {{- include "gameplane.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101            # the nginx user in nginx-unprivileged
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: web
          image: {{ include "gameplane.webImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # The in-cluster API service nginx proxies non-HTML requests to.
            - name: API_UPSTREAM
              value: {{ printf "http://gameplane-api.%s.svc.cluster.local" .Release.Namespace | quote }}
          ports:
            - { name: http, containerPort: 8080 }
          livenessProbe:  { httpGet: { path: /nginx-health, port: http }, initialDelaySeconds: 5 }
          readinessProbe: { httpGet: { path: /nginx-health, port: http }, initialDelaySeconds: 3 }
          resources: {{ toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            # With readOnlyRootFilesystem, every path nginx writes at start
            # must be an emptyDir: the entrypoint renders the config into
            # conf.d (envsubst), nginx-unprivileged writes its pid to /tmp,
            # and proxy/temp bodies go under /var/cache/nginx and /var/run.
            - { name: conf, mountPath: /etc/nginx/conf.d }
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: run, mountPath: /var/run }
      volumes:
        - { name: conf, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
        - { name: cache, emptyDir: {} }
        - { name: run, emptyDir: {} }
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: gameplane-web
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/name: gameplane-web }
  ports:
    - { name: http, port: 80, targetPort: http }
{{- end }}
