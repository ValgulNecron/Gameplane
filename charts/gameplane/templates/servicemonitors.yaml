{{- if .Values.serviceMonitors.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: gameplane-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: gameplane-operator
    {{- include "gameplane.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/name: gameplane-operator }
  ports:
    - { name: metrics, port: 8080, targetPort: metrics }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gameplane-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gameplane.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitors.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: gameplane-operator }
  endpoints:
    - { port: metrics, interval: 30s }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gameplane-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gameplane.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitors.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: gameplane-api }
  endpoints:
    - { port: http, interval: 30s, path: /metrics }
{{- end }}
