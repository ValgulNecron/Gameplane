apiVersion: v1
kind: ServiceAccount
metadata:
  name: gameplane-operator
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
---
# Cluster-wide reads: the operator watches Gameplane CRDs and workload
# primitives across all namespaces (multi-namespace installs are a
# supported future mode). Reads are broad; writes are narrower and
# bound per-namespace via the Role below.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-operator-watch
  labels: {{- include "gameplane.labels" . | nindent 4 }}
rules:
  - apiGroups: ["gameplane.gg"]
    resources: [gameservers, gametemplates, backups, backupschedules, restores, modules, modulesources]
    verbs: [get, list, watch]
  # GameTemplate is cluster-scoped; the gametemplate controller updates
  # status (inUseCount) and the module controller creates/deletes
  # templates owned by Module objects.
  - apiGroups: ["gameplane.gg"]
    resources: [gametemplates, gametemplates/status]
    verbs: [get, list, watch, create, update, patch, delete]
  # Module is cluster-scoped; the module controller updates its own
  # status, manages a finalizer (so a Module can't be deleted while a
  # GameServer references its template), and patches spec mid-reconcile
  # when version tracking resolves "latest" to a concrete tag.
  - apiGroups: ["gameplane.gg"]
    resources: [modules, modules/status]
    verbs: [get, update, patch]
  - apiGroups: ["gameplane.gg"]
    resources: [modules/finalizers]
    verbs: [update]
  # ModuleSource is cluster-scoped, read-only on spec; controller writes
  # the cached catalog into status.
  - apiGroups: ["gameplane.gg"]
    resources: [modulesources/status]
    verbs: [get, update, patch]
  - apiGroups: ["apps"]
    resources: [statefulsets]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services, persistentvolumeclaims, configmaps, secrets, pods, pods/log, serviceaccounts]
    verbs: [get, list, watch]
  # The GameServer controller owns per-server agent RBAC objects and
  # watches them for drift repair; writes stay namespace-scoped below.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles, rolebindings]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  # CSI VolumeSnapshots back the volume-snapshot backup strategy: the
  # backup controller watches them cluster-wide for readyToUse and reads
  # the (cluster-scoped) content objects they bind to. Creation/deletion is
  # namespace-scoped in the manage Role below.
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: [volumesnapshots, volumesnapshotcontents]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-operator-watch
  labels: {{- include "gameplane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-operator-watch
subjects:
  - kind: ServiceAccount
    name: gameplane-operator
    namespace: {{ .Release.Namespace }}
---
# Namespace-scoped writes: the operator mutates StatefulSets, Services,
# PVCs, Secrets (for RCON passwords + mTLS server certs), Jobs (for
# backups), and the Gameplane CRDs themselves — but only in the games
# namespace. A multi-namespace install creates additional RoleBindings
# here.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-operator-manage
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
rules:
  - apiGroups: ["gameplane.gg"]
    resources: [gameservers, backups, backupschedules, restores]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["gameplane.gg"]
    resources: [gameservers/status, backups/status, backupschedules/status, restores/status]
    verbs: [get, update, patch]
  - apiGroups: ["gameplane.gg"]
    resources: [gameservers/finalizers, backups/finalizers, backupschedules/finalizers, restores/finalizers]
    verbs: [update]
  - apiGroups: ["apps"]
    resources: [statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services, persistentvolumeclaims, configmaps, secrets]
    verbs: [get, list, watch, create, update, patch, delete]
  # Per-GameServer agent identity: SA + heartbeat Role/RoleBinding
  # (resourceNames-scoped to one GameServer's status subresource).
  # Granting gameservers/status passes the RBAC escalation check
  # because this Role already holds that permission above.
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles, rolebindings]
    verbs: [get, list, watch, create, update, patch, delete]
  # The backup controller creates VolumeSnapshots in the games namespace
  # for the volume-snapshot backup strategy (deleted via owner GC when the
  # Backup is trimmed).
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: [volumesnapshots]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-operator-manage
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-operator-manage
subjects:
  - kind: ServiceAccount
    name: gameplane-operator
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gameplane-operator-leader-election
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events, configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gameplane-operator-leader-election
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gameplane-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: gameplane-operator
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gameplane-operator
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gameplane-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gameplane-operator
        {{- include "gameplane.labels" . | nindent 8 }}
    spec:
      serviceAccountName: gameplane-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: manager
          image: {{ include "gameplane.operatorImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- if .Values.operator.leaderElect }}
            - --leader-elect
            {{- end }}
            - --agent-image={{ include "gameplane.agentImage" . }}
            - --agent-ca-bundle=/etc/gameplane/agent-ca/ca.crt
            - --agent-client-cert=/etc/gameplane/agent-client/tls.crt
            - --agent-client-key=/etc/gameplane/agent-client/tls.key
            - --agent-ca-secret-name={{ .Values.api.agentMTLS.caSecretRef.name }}
            - --agent-ca-secret-namespace={{ .Release.Namespace }}
            - --module-namespace={{ .Release.Namespace }}
            {{- if .Values.operator.localModules.enabled }}
            - --module-local-root={{ .Values.operator.localModules.mountPath }}
            {{- end }}
          ports:
            - { name: metrics, containerPort: 8080 }
            - { name: health,  containerPort: 8081 }
          livenessProbe:  { httpGet: { path: /healthz, port: health }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /readyz,  port: health }, initialDelaySeconds: 5 }
          resources: {{ toYaml .Values.operator.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: agent-ca, mountPath: /etc/gameplane/agent-ca, readOnly: true }
            - { name: agent-client, mountPath: /etc/gameplane/agent-client, readOnly: true }
            {{- if .Values.operator.localModules.enabled }}
            - { name: local-modules, mountPath: {{ .Values.operator.localModules.mountPath }}, readOnly: true }
            {{- end }}
      volumes:
        - name: agent-ca
          secret: { secretName: {{ .Values.api.agentMTLS.caSecretRef.name }} }
        - name: agent-client
          secret: { secretName: {{ .Values.api.agentMTLS.clientCertRef.name }} }
        {{- if .Values.operator.localModules.enabled }}
        - name: local-modules
          {{- if .Values.operator.localModules.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.operator.localModules.existingClaim }}
          {{- else if .Values.operator.localModules.hostPath }}
          hostPath:
            path: {{ .Values.operator.localModules.hostPath }}
            type: Directory
          {{- else }}
          {{- fail "operator.localModules.enabled requires existingClaim or hostPath" }}
          {{- end }}
        {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
