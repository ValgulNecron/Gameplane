apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.gamesNamespace }}
  labels:
    {{- include "gameplane.labels" . | nindent 4 }}
    {{- if .Values.podSecurity.enforceRestricted }}
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    {{- end }}
