apiVersion: v1
kind: ServiceAccount
metadata:
  name: gameplane-api
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
---
# Cluster-wide READ access: templates (cluster-scoped), nodes, storage
# classes, and read-only watches on Gameplane CRDs for the /events stream.
# Note the absence of any write verb here — mutation permissions are
# bound per-namespace via Role + RoleBinding below.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-api-read
  labels: {{- include "gameplane.labels" . | nindent 4 }}
rules:
  - apiGroups: ["gameplane.local"]
    resources: [gameservers, gametemplates, backups, backupschedules, restores, modules, modulesources]
    verbs: [get, list, watch]
  - apiGroups: ["gameplane.local"]
    resources: [gametemplates]
    verbs: [create, update, patch, delete]      # templates are cluster-scoped; admin UI edits them
  - apiGroups: ["gameplane.local"]
    resources: [modules]
    verbs: [create, update, patch, delete]      # modules are cluster-scoped; install/upgrade/uninstall from the dashboard
  - apiGroups: ["gameplane.local"]
    resources: [modulesources]
    verbs: [create, update, patch, delete]      # source management (add/edit/remove sources) from the dashboard
  - apiGroups: ["gameplane.local"]
    resources: [clusters]
    verbs: [get, list, watch, create, delete]   # cluster registration and management from the dashboard
  - apiGroups: [""]
    resources: [nodes, events]
    verbs: [get, list, watch]
  # Cluster storage stats (api/internal/handlers/cluster.go) sum
  # PersistentVolume capacity (cluster-scoped) for the dashboard.
  - apiGroups: [""]
    resources: [persistentvolumes]
    verbs: [get, list, watch]
  - apiGroups: ["storage.k8s.io"]
    resources: [storageclasses]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-api-read
  labels: {{- include "gameplane.labels" . | nindent 4 }}
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: {{ .Release.Name }}-api-read }
subjects:
  - kind: ServiceAccount
    name: gameplane-api
    namespace: {{ .Release.Namespace }}
---
# Namespace-scoped WRITE access: limited to the games namespace(s) the
# API is allowed to mutate. Expanding this to additional namespaces
# requires a new RoleBinding here AND adding them to
# GAMEPLANE_EXTRA_NAMESPACES on the API Deployment.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-api-games
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
rules:
  - apiGroups: ["gameplane.local"]
    resources: [gameservers, backups, backupschedules, restores]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["gameplane.local"]
    resources: [gameservers/status, backups/status, backupschedules/status, restores/status]
    verbs: [get, update, patch]
  # The PTY console (api/internal/ws/attach.go) attaches to the game
  # container via the pod-attach subresource. SPDY uses POST (create);
  # the websocket transport uses GET.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get]
  - apiGroups: [""]
    resources: [pods/attach]
    verbs: [get, create]
  # The startup-log stream (api/internal/ws/podlogs.go) follows the game
  # container's stdout via the pod-log subresource so download/config
  # output is visible before the game's own log file exists.
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  # Backup destinations are Secrets in the games namespace
  # (api/internal/handlers/destinations.go).
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-api-games
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: {{ .Release.Name }}-api-games }
subjects:
  - kind: ServiceAccount
    name: gameplane-api
    namespace: {{ .Release.Namespace }}
---
# Module upload bundles are ConfigMaps in the control-plane namespace
# (api/internal/handlers/module_upload.go); the operator indexes them
# via upload-type ModuleSources.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-api-uploads
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, create, update, delete]
  # Notification sink credentials live as Secrets here in the
  # control-plane namespace. The API reads them at delivery time and —
  # since the Add-sink form accepts the secret value directly — also
  # creates/updates/deletes them. RBAC can't filter by label, so the
  # real boundary is in code: reads and updates refuse Secrets not
  # labelled gameplane.local/notification-sink=true, and deletes
  # additionally require gameplane.local/managed-by=gameplane-api so
  # kubectl-/GitOps-created Secrets are never deleted over HTTP
  # (api/internal/notify/sinks.go, api/internal/handlers/secrets_managed.go).
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, create, update, patch, delete]
  # System logs admin endpoint (api/internal/handlers/systemlogs.go)
  # streams operator and API pod logs from the control-plane namespace.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-api-uploads
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: {{ .Release.Name }}-api-uploads }
subjects:
  - kind: ServiceAccount
    name: gameplane-api
    namespace: {{ .Release.Namespace }}
---
{{- if eq .Values.api.db.driver "sqlite" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gameplane-api-data
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: {{ .Values.api.storage.size }} }
  {{- with .Values.api.storage.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gameplane-api
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/name: gameplane-api }
  {{- if eq .Values.api.db.driver "sqlite" }}
  # Recreate strategy for SQLite: the database is a single-writer store
  # on a ReadWriteOnce PVC. RollingUpdate would start a new pod before
  # terminating the old one, allowing two processes to compete for the
  # database file. The legacy adoption code would race the old writer,
  # risking corruption. Recreate ensures the old pod is fully gone first.
  strategy:
    type: Recreate
  {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gameplane-api
        {{- include "gameplane.labels" . | nindent 8 }}
    spec:
      serviceAccountName: gameplane-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: {{ include "gameplane.apiImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --db-driver={{ .Values.api.db.driver }}
            - --db-dsn={{ .Values.api.db.dsn }}
            {{- if .Values.api.oidc.enabled }}
            - --oidc-issuer={{ .Values.api.oidc.issuer }}
            - --oidc-client-id={{ .Values.api.oidc.clientID }}
            - --oidc-redirect-url={{ .Values.api.oidc.redirectURL }}
            {{- end }}
            - --agent-ca-bundle=/etc/gameplane/agent-ca/ca.crt
            - --agent-client-cert=/etc/gameplane/agent-client/tls.crt
            - --agent-client-key=/etc/gameplane/agent-client/tls.key
            {{- if gt (int .Values.api.audit.retentionDays) 0 }}
            - --audit-retention-days={{ .Values.api.audit.retentionDays }}
            {{- end }}
            {{- if .Values.api.audit.stdout }}
            - --audit-stdout
            {{- end }}
            {{- $webhookURL := .Values.api.audit.webhook.url }}
            {{- if and (not $webhookURL) .Values.api.audit.webhook.syslogBridge.enabled }}
            {{- $webhookURL = printf "http://gameplane-audit-syslog-bridge.%s.svc:8514/" .Release.Namespace }}
            {{- end }}
            {{- if $webhookURL }}
            - --audit-webhook-url={{ $webhookURL }}
            {{- end }}
            {{- if .Values.api.audit.s3.endpoint }}
            - --audit-s3-endpoint={{ .Values.api.audit.s3.endpoint }}
            - --audit-s3-bucket={{ .Values.api.audit.s3.bucket }}
            {{- if .Values.api.audit.s3.prefix }}
            - --audit-s3-prefix={{ .Values.api.audit.s3.prefix }}
            {{- end }}
            {{- if .Values.api.audit.s3.region }}
            - --audit-s3-region={{ .Values.api.audit.s3.region }}
            {{- end }}
            {{- if .Values.api.audit.s3.insecure }}
            - --audit-s3-insecure
            {{- end }}
            {{- end }}
            {{- $telemetryURL := .Values.api.telemetry.endpoint }}
            {{- if and (not $telemetryURL) .Values.api.telemetry.receiver.enabled }}
            {{- $telemetryURL = printf "http://gameplane-telemetry-receiver.%s.svc:8080/ingest" .Release.Namespace }}
            {{- end }}
            {{- if $telemetryURL }}
            - --telemetry-endpoint={{ $telemetryURL }}
            {{- end }}
            {{- if .Values.updates.channel }}
            - --update-channel={{ .Values.updates.channel }}
            {{- end }}
          env:
            - name: GAMEPLANE_NAMESPACE
              valueFrom:
                fieldRef: { fieldPath: metadata.namespace }
            {{- if .Values.clusterOps.enabled }}
            - name: GAMEPLANE_CLUSTER_OPS
              value: "true"
            {{- end }}
            {{- if .Values.api.oidc.enabled }}
            - name: GAMEPLANE_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.oidc.clientSecretRef.name }}
                  key:  {{ .Values.api.oidc.clientSecretRef.key }}
            {{- end }}
            {{- if .Values.api.audit.webhook.authSecretRef.name }}
            - name: GAMEPLANE_AUDIT_WEBHOOK_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.audit.webhook.authSecretRef.name }}
                  key:  {{ .Values.api.audit.webhook.authSecretRef.key }}
            {{- end }}
            {{- if .Values.api.audit.s3.credentialsSecretRef.name }}
            - name: GAMEPLANE_AUDIT_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.audit.s3.credentialsSecretRef.name }}
                  key:  {{ .Values.api.audit.s3.credentialsSecretRef.accessKeyKey }}
            - name: GAMEPLANE_AUDIT_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.audit.s3.credentialsSecretRef.name }}
                  key:  {{ .Values.api.audit.s3.credentialsSecretRef.secretKeyKey }}
            {{- end }}
            {{- if .Values.api.telemetry.authSecretRef.name }}
            - name: GAMEPLANE_TELEMETRY_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.telemetry.authSecretRef.name }}
                  key:  {{ .Values.api.telemetry.authSecretRef.key }}
            {{- end }}
            - name: GAMEPLANE_LOG_LEVEL
              value: {{ .Values.api.logLevel | quote }}
          ports:
            - { name: http,    containerPort: 8000 }
          livenessProbe:  { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 5 }
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: agent-ca, mountPath: /etc/gameplane/agent-ca, readOnly: true }
            - { name: agent-client, mountPath: /etc/gameplane/agent-client, readOnly: true }
      volumes:
        - name: data
          {{- if eq .Values.api.db.driver "sqlite" }}
          persistentVolumeClaim: { claimName: gameplane-api-data }
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: agent-ca
          secret: { secretName: {{ .Values.api.agentMTLS.caSecretRef.name }} }
        - name: agent-client
          secret: { secretName: {{ .Values.api.agentMTLS.clientCertRef.name }} }
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: gameplane-api
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gameplane.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/name: gameplane-api }
  ports:
    - { name: http, port: 80, targetPort: http }
