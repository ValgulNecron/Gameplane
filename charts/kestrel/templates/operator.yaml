apiVersion: v1
kind: ServiceAccount
metadata:
  name: kestrel-operator
  namespace: {{ .Release.Namespace }}
  labels: {{- include "kestrel.labels" . | nindent 4 }}
---
# Cluster-wide reads: the operator watches Kestrel CRDs and workload
# primitives across all namespaces (multi-namespace installs are a
# supported future mode). Reads are broad; writes are narrower and
# bound per-namespace via the Role below.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-operator-watch
  labels: {{- include "kestrel.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kestrel.gg"]
    resources: [gameservers, gametemplates, backups, backupschedules, restores]
    verbs: [get, list, watch]
  - apiGroups: ["kestrel.gg"]
    resources: [gametemplates, gametemplates/status]
    verbs: [get, list, watch, update, patch]
  - apiGroups: ["apps"]
    resources: [statefulsets]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services, persistentvolumeclaims, configmaps, secrets, pods, pods/log]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-operator-watch
  labels: {{- include "kestrel.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-operator-watch
subjects:
  - kind: ServiceAccount
    name: kestrel-operator
    namespace: {{ .Release.Namespace }}
---
# Namespace-scoped writes: the operator mutates StatefulSets, Services,
# PVCs, Secrets (for RCON passwords + mTLS server certs), Jobs (for
# backups), and the Kestrel CRDs themselves — but only in the games
# namespace. A multi-namespace install creates additional RoleBindings
# here.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-operator-manage
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "kestrel.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kestrel.gg"]
    resources: [gameservers, backups, backupschedules, restores]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["kestrel.gg"]
    resources: [gameservers/status, backups/status, backupschedules/status, restores/status]
    verbs: [get, update, patch]
  - apiGroups: ["kestrel.gg"]
    resources: [gameservers/finalizers, backups/finalizers, backupschedules/finalizers, restores/finalizers]
    verbs: [update]
  - apiGroups: ["apps"]
    resources: [statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services, persistentvolumeclaims, configmaps, secrets]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-operator-manage
  namespace: {{ .Values.gamesNamespace }}
  labels: {{- include "kestrel.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-operator-manage
subjects:
  - kind: ServiceAccount
    name: kestrel-operator
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kestrel-operator-leader-election
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events, configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kestrel-operator-leader-election
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kestrel-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: kestrel-operator
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kestrel-operator
  namespace: {{ .Release.Namespace }}
  labels: {{- include "kestrel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kestrel-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kestrel-operator
        {{- include "kestrel.labels" . | nindent 8 }}
    spec:
      serviceAccountName: kestrel-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: manager
          image: {{ include "kestrel.operatorImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect
            - --agent-image={{ include "kestrel.agentImage" . }}
            - --agent-ca-bundle=/etc/kestrel/agent-ca/ca.crt
            - --agent-client-cert=/etc/kestrel/agent-client/tls.crt
            - --agent-client-key=/etc/kestrel/agent-client/tls.key
            - --module-namespace={{ .Release.Namespace }}
          ports:
            - { name: metrics, containerPort: 8080 }
            - { name: health,  containerPort: 8081 }
          livenessProbe:  { httpGet: { path: /healthz, port: health }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /readyz,  port: health }, initialDelaySeconds: 5 }
          resources: {{ toYaml .Values.operator.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: agent-ca, mountPath: /etc/kestrel/agent-ca, readOnly: true }
            - { name: agent-client, mountPath: /etc/kestrel/agent-client, readOnly: true }
      volumes:
        - name: agent-ca
          secret: { secretName: {{ .Values.api.agentMTLS.caSecretRef.name }} }
        - name: agent-client
          secret: { secretName: {{ .Values.api.agentMTLS.clientCertRef.name }} }
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
