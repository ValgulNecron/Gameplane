{{- if .Values.clusterOps.enabled }}
# RBAC for the credential-minting cluster operations (Add node, Download
# kubeconfig). Granted ONLY when clusterOps.enabled — these are powerful
# (create bootstrap tokens; approve client-cert CSRs), so they are opt-in
# and off by default.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-api-bootstrap-tokens
  namespace: kube-system
  labels: {{- include "kestrel.labels" . | nindent 4 }}
rules:
  # Add node creates bootstrap-token Secrets so a new node can join.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-api-bootstrap-tokens
  namespace: kube-system
  labels: {{- include "kestrel.labels" . | nindent 4 }}
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: {{ .Release.Name }}-api-bootstrap-tokens }
subjects:
  - kind: ServiceAccount
    name: kestrel-api
    namespace: {{ .Release.Namespace }}
---
# Download kubeconfig: create + approve short-lived client-cert CSRs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-api-kubeconfig
  labels: {{- include "kestrel.labels" . | nindent 4 }}
rules:
  - apiGroups: ["certificates.k8s.io"]
    resources: [certificatesigningrequests]
    verbs: [create, get, delete]
  - apiGroups: ["certificates.k8s.io"]
    resources: [certificatesigningrequests/approval]
    verbs: [update]
  - apiGroups: ["certificates.k8s.io"]
    resources: [signers]
    resourceNames: ["kubernetes.io/kube-apiserver-client"]
    verbs: [approve]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-api-kubeconfig
  labels: {{- include "kestrel.labels" . | nindent 4 }}
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: {{ .Release.Name }}-api-kubeconfig }
subjects:
  - kind: ServiceAccount
    name: kestrel-api
    namespace: {{ .Release.Namespace }}
---
# Downloaded kubeconfigs carry the group "kestrel:dashboard"; bind it to
# the built-in read-only "view" ClusterRole so they grant kubectl read
# access (get/list/watch), not mutation. Adjust the roleRef to widen or
# narrow what a downloaded kubeconfig can do.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-dashboard-view
  labels: {{- include "kestrel.labels" . | nindent 4 }}
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: view }
subjects:
  - kind: Group
    name: "kestrel:dashboard"
    apiGroup: rbac.authorization.k8s.io
{{- end }}
