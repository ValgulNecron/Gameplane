# One-shot Job that initializes the shared restic repository before the
# parallel backup/restore tests run (see ensureResticRepo in
# test_helpers_e2e_test.go). Runs in gameplane-games because that's the
# namespace whose egress NetworkPolicy is widened to reach the restic
# server (restic-server.yaml), and mirrors the security context the
# operator puts on its backup Jobs so it passes a restricted
# pod-security namespace too.
apiVersion: batch/v1
kind: Job
metadata:
  name: e2e-restic-warmup
  namespace: gameplane-games
  labels:
    app.kubernetes.io/component: e2e-fixture
spec:
  # A poisoned repo (config written, key not — see restic-server.yaml) makes
  # every in-pod retry 403, so long in-pod backoff only delays recovery. Fail
  # fast and let ensureResticRepo reset the server + re-init (test_helpers).
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/component: e2e-fixture
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: restic
          image: restic/restic:0.17.1
          command: ["/bin/sh", "-c"]
          # `cat config` is the canonical "does the repo exist" probe;
          # `init` is idempotent against an empty target. Same recipe as
          # the operator's restic-init init container.
          args: ["restic cat config >/dev/null 2>&1 || restic init"]
          env:
            - name: RESTIC_REPOSITORY
              valueFrom:
                secretKeyRef: { name: e2e-restic-creds, key: repo }
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef: { name: e2e-restic-creds, key: password }
            - name: XDG_CACHE_HOME
              value: /tmp/restic-cache
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
          volumeMounts:
            - { name: cache, mountPath: /tmp }
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
      volumes:
        - { name: cache, emptyDir: {} }
