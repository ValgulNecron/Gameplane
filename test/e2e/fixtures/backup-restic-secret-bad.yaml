# Restic credentials with a deliberately wrong password against the
# SAME repo URL as backup-restic-secret.yaml. The repo password is the
# repository encryption key (the REST server itself runs --no-auth), so
# the failure only manifests when the repo already exists with a
# different key: `restic init` fails with "config file already exists"
# and the backup fails with "wrong password or no key found". Pointing
# at a fresh path would just initialize a new repo with this password
# and succeed — the failure-path test seeds the real repo first.
apiVersion: v1
kind: Secret
metadata:
  name: e2e-restic-creds-bad
  namespace: kestrel-games
  labels:
    app.kubernetes.io/component: e2e-fixture
type: Opaque
stringData:
  repo: "rest:http://kestrel-test-restic.kestrel-system.svc:8000/"
  password: "definitely-not-the-right-password"
