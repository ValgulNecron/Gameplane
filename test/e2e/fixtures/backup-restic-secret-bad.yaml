# Restic credentials with a deliberately wrong password. Used by the
# failure-path test to assert the operator surfaces a Failed phase when
# the underlying restic Job can't authenticate against its repo. The
# backup-restic-secret.yaml fixture's repo URL is reused so the Backup
# at least connects to a real REST server before failing on auth.
apiVersion: v1
kind: Secret
metadata:
  name: e2e-restic-creds-bad
  namespace: kestrel-games
  labels:
    app.kubernetes.io/component: e2e-fixture
type: Opaque
stringData:
  repo: "rest:http://kestrel-test-restic.kestrel-system.svc:8000/bad-repo/"
  password: "definitely-not-the-right-password"
