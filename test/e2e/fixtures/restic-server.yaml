# In-cluster restic REST server backing Backup/Restore e2e tests.
# Plain HTTP, --no-auth — fine for a throwaway kind cluster, never
# acceptable in production. emptyDir: state lives only as long as the
# pod, which is exactly what test runs want.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gameplane-test-restic
  namespace: gameplane-system
  labels:
    app.kubernetes.io/name: gameplane-test-restic
    app.kubernetes.io/component: e2e-fixture
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: gameplane-test-restic }
  template:
    metadata:
      labels: { app.kubernetes.io/name: gameplane-test-restic }
    spec:
      containers:
        - name: restic
          image: restic/rest-server:0.13.0
          # The image's default CMD ("rest-server") gets clobbered if we
          # only set args; reinstate it explicitly so --no-auth lands as
          # a flag rather than as the executable.
          command: ["rest-server"]
          args: ["--listen", ":8000", "--no-auth"]
          ports:
            - { name: http, containerPort: 8000 }
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 2
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - { name: data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: gameplane-test-restic
  namespace: gameplane-system
  labels:
    app.kubernetes.io/name: gameplane-test-restic
    app.kubernetes.io/component: e2e-fixture
spec:
  selector: { app.kubernetes.io/name: gameplane-test-restic }
  ports:
    - { name: http, port: 8000, targetPort: http }
---
# Default game-namespace egress allows only DNS. Backup pods run in
# gameplane-games and need to reach the restic-server in gameplane-system,
# so widen the policy for this single port. Scoped to the gameplane-system
# namespace (and the restic Service's pod label) so we're not opening a
# back door to anything else.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-restic
  namespace: gameplane-games
  labels:
    app.kubernetes.io/component: e2e-fixture
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gameplane-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gameplane-test-restic
      ports:
        - { protocol: TCP, port: 8000 }
