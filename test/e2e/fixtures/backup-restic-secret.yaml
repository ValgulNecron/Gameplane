# Restic repository credentials referenced by Backup.spec.repoRef.
# Keys "repo" and "password" are baked into the operator (see
# operator/internal/controller/backup_controller.go: RESTIC_REPOSITORY
# and RESTIC_PASSWORD env wiring) — don't rename without updating both.
apiVersion: v1
kind: Secret
metadata:
  name: e2e-restic-creds
  namespace: gameplane-games
  labels:
    app.kubernetes.io/component: e2e-fixture
type: Opaque
stringData:
  # rest:// scheme tells restic to talk to the REST server.
  repo: "rest:http://gameplane-test-restic.gameplane-system.svc:8000/"
  password: "e2e-test-password-not-secret"
