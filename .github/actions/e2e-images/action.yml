name: load e2e images
description: >
  Download the prebuilt e2e image tar (produced by the build-e2e-images action
  in the build-images job) and `docker load` it into the runner's docker
  daemon, so deploy/kind/e2e.sh can `kind load` the images without recompiling.
  Replaces the old build-on-every-job behavior; e2e.sh's build-fallback still
  covers a missing image.
inputs:
  arch:
    description: Architecture label of the image tar to load (amd64 or arm64).
    required: false
    default: amd64
runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: e2e-images-${{ inputs.arch }}
        path: ${{ runner.temp }}/e2e-images
    - name: load images into docker
      shell: bash
      run: docker load -i "$RUNNER_TEMP/e2e-images/e2e-images.tar"
