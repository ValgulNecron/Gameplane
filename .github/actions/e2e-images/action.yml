name: build e2e images
description: >
  Build the operator/api/agent images the kind e2e suites load into the
  cluster, tagged gameplane-test/<component>:e2e exactly like
  `make e2e-images`, but through buildx with the GitHub Actions layer
  cache (same pattern as publish-edge.yaml) so warm runs skip the Go
  module download and most of the compile.
runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: operator/Dockerfile
        tags: gameplane-test/operator:e2e
        load: true
        cache-from: type=gha,scope=e2e-operator
        cache-to: type=gha,mode=max,scope=e2e-operator
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: api/Dockerfile
        tags: gameplane-test/api:e2e
        load: true
        cache-from: type=gha,scope=e2e-api
        cache-to: type=gha,mode=max,scope=e2e-api
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: agent/Dockerfile
        tags: gameplane-test/agent:e2e
        load: true
        cache-from: type=gha,scope=e2e-agent
        cache-to: type=gha,mode=max,scope=e2e-agent
