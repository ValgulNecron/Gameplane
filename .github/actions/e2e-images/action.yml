name: build e2e images
description: >
  Build the operator/api/agent images the kind e2e suites load into the
  cluster, tagged gameplane-test/<component>:e2e exactly like
  `make e2e-images`, but concurrently via buildx bake (docker-bake.hcl)
  with the GitHub Actions layer cache. The layer cache only ever saves
  the dependency-download layers — the compile layers are invalidated by
  every source change — so imports are cheap wins and exports are mostly
  overhead; hence the single-writer switch below.
inputs:
  export-cache:
    description: >
      Also write the layer cache back (type=gha, mode=max). Enable on
      exactly ONE job per workflow run: every e2e job builds the same
      three images, so concurrent exporters just race to upload the same
      layers and each pays ~1 min doing it.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
    - if: inputs.export-cache != 'true'
      uses: docker/bake-action@v6
      with:
        files: docker-bake.hcl
        targets: e2e
        load: true
        set: |
          e2e-operator.cache-from=type=gha,scope=e2e-operator
          e2e-api.cache-from=type=gha,scope=e2e-api
          e2e-agent.cache-from=type=gha,scope=e2e-agent
    - if: inputs.export-cache == 'true'
      uses: docker/bake-action@v6
      with:
        files: docker-bake.hcl
        targets: e2e
        load: true
        set: |
          e2e-operator.cache-from=type=gha,scope=e2e-operator
          e2e-api.cache-from=type=gha,scope=e2e-api
          e2e-agent.cache-from=type=gha,scope=e2e-agent
          e2e-operator.cache-to=type=gha,mode=max,scope=e2e-operator
          e2e-api.cache-to=type=gha,mode=max,scope=e2e-api
          e2e-agent.cache-to=type=gha,mode=max,scope=e2e-agent
