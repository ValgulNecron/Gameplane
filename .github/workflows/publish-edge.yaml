name: publish-edge

# Continuously publish beta images to GHCR on every push to main, so testers
# can track the latest build without waiting for a tagged release. Tagged
# releases (release.yaml, triggered by v* tags) remain the recommended,
# version-pinned install path; this is the rolling "edge" channel.
#
# Images: ghcr.io/<owner>/gameplane/{operator,api,agent,audit-syslog-bridge,telemetry-receiver,mcp-server}:edge
#         ...and an immutable :sha-<short> tag for pinning a specific commit.
# Consume with: helm install ... --set image.tag=edge

on:
  push:
    branches: [main]
    # Only rebuild when something that lands in an image changes. Docs/chart
    # edits don't need a fresh image push.
    paths:
      - "operator/**"
      - "api/**"
      - "agent/**"
      - "netguard/**"
      - "audit-syslog-bridge/**"
      - "telemetry-receiver/**"
      - "mcp-server/**"
      - "go.work"
      - "go.work.sum"
      - "**/Dockerfile"
      - ".github/workflows/publish-edge.yaml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

# Don't stack edge publishes: a newer main push supersedes an in-flight one.
concurrency:
  group: publish-edge
  cancel-in-progress: true

jobs:
  images:
    name: build & push edge image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [operator, api, agent, audit-syslog-bridge, telemetry-receiver, mcp-server]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          # Same path as release.yaml so the edge and released images sit side
          # by side under one package. metadata-action lowercases the owner.
          images: ghcr.io/${{ github.repository_owner }}/gameplane/${{ matrix.component }}
          tags: |
            type=raw,value=edge
            type=sha,prefix=sha-,format=short
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=edge-${{ github.sha }}
          cache-from: type=gha,scope=edge-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=edge-${{ matrix.component }}
      # Keyed-sign the pushed image by digest (offline, no Rekor), mirroring the
      # module-bundle signing in release.yaml. Gated on COSIGN_PRIVATE_KEY so the
      # edge publish still succeeds before the signing key is provisioned
      # (secrets aren't usable in `if:`, so gate via a plain step output).
      - name: signing key present?
        id: gate
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -n "$COSIGN_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::COSIGN_PRIVATE_KEY not set — skipping image signing."
          fi
      - name: install cosign
        if: steps.gate.outputs.enabled == 'true'
        uses: sigstore/cosign-installer@v3
        with:
          # Pin cosign v2: v3 dropped the offline-keyed `--tlog-upload=false`
          # flag this signing uses (it now requires a signing-config).
          cosign-release: 'v2.4.3'
      - name: sign image (keyed, offline)
        if: steps.gate.outputs.enabled == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          cosign sign --yes --tlog-upload=false --key env://COSIGN_PRIVATE_KEY \
            "ghcr.io/${owner_lc}/gameplane/${{ matrix.component }}@${DIGEST}"
      # Round-trip check: derive the public key from the signing secret and
      # verify the signature just pushed, so a corrupted key or a sign/verify
      # flag mismatch fails the publish instead of every user's `cosign
      # verify`. When cosign.pub is committed in the repo it must match the
      # derived key — a mismatch means the key was rotated without updating
      # the published one.
      - name: verify signature & check published key
        if: steps.gate.outputs.enabled == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          cosign public-key --key env://COSIGN_PRIVATE_KEY --outfile "$RUNNER_TEMP/cosign.pub"
          cosign verify --key "$RUNNER_TEMP/cosign.pub" --insecure-ignore-tlog=true \
            "ghcr.io/${owner_lc}/gameplane/${{ matrix.component }}@${DIGEST}"
          if [ -f cosign.pub ] && ! cmp -s cosign.pub "$RUNNER_TEMP/cosign.pub"; then
            echo "::error::committed cosign.pub does not match COSIGN_PRIVATE_KEY — update the published key"
            exit 1
          fi
      # Surface the verification key (job summary + artifact) so publishing or
      # rotating the repo's cosign.pub never requires handling the private key
      # outside CI. One matrix leg is enough — the key is the same for all.
      - name: export public key
        if: steps.gate.outputs.enabled == 'true' && matrix.component == 'operator'
        run: |
          {
            echo '### cosign public key'
            echo '```'
            cat "$RUNNER_TEMP/cosign.pub"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: upload public key artifact
        if: steps.gate.outputs.enabled == 'true' && matrix.component == 'operator'
        uses: actions/upload-artifact@v4
        with:
          name: cosign-pub
          path: ${{ runner.temp }}/cosign.pub
