name: publish-edge

# Continuously publish beta images to GHCR on every push to main, so testers
# can track the latest build without waiting for a tagged release. Tagged
# releases (release.yaml, triggered by v* tags) remain the recommended,
# version-pinned install path; this is the rolling "edge" channel.
#
# Images: ghcr.io/<owner>/gameplane/{operator,api,agent}:edge
#         ...and an immutable :sha-<short> tag for pinning a specific commit.
# Consume with: helm install ... --set image.tag=edge

on:
  push:
    branches: [main]
    # Only rebuild when something that lands in an image changes. Docs/chart
    # edits don't need a fresh image push.
    paths:
      - "operator/**"
      - "api/**"
      - "agent/**"
      - "netguard/**"
      - "go.work"
      - "go.work.sum"
      - "**/Dockerfile"
      - ".github/workflows/publish-edge.yaml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

# Don't stack edge publishes: a newer main push supersedes an in-flight one.
concurrency:
  group: publish-edge
  cancel-in-progress: true

jobs:
  images:
    name: build & push edge image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [operator, api, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          # Same path as release.yaml so the edge and released images sit side
          # by side under one package. metadata-action lowercases the owner.
          images: ghcr.io/${{ github.repository_owner }}/gameplane/${{ matrix.component }}
          tags: |
            type=raw,value=edge
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=edge-${{ github.sha }}
          cache-from: type=gha,scope=edge-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=edge-${{ matrix.component }}
