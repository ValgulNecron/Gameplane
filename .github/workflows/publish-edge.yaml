name: publish-edge

# Continuously publish beta images to GHCR on every push to main, so testers
# can track the latest build without waiting for a tagged release. Tagged
# releases (release.yaml, triggered by v* tags) remain the recommended,
# version-pinned install path; this is the rolling "edge" channel.
#
# Images: ghcr.io/<owner>/gameplane/{operator,api,agent,audit-syslog-bridge,telemetry-receiver,mcp-server}:edge
#         ...and an immutable :sha-<short> tag for pinning a specific commit.
# Consume with: helm install ... --set image.tag=edge

on:
  push:
    branches: [main]
    # Only rebuild when something that lands in an image changes. Docs/chart
    # edits don't need a fresh image push.
    paths:
      - "operator/**"
      - "api/**"
      - "web/**"
      - "agent/**"
      - "netguard/**"
      - "audit-syslog-bridge/**"
      - "telemetry-receiver/**"
      - "mcp-server/**"
      - "go.work"
      - "go.work.sum"
      - "**/Dockerfile"
      - ".github/workflows/publish-edge.yaml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

# Don't stack edge publishes: a newer main push supersedes an in-flight one.
concurrency:
  group: publish-edge
  cancel-in-progress: true

jobs:
  images:
    name: build & push edge image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [operator, api, web, agent, audit-syslog-bridge, telemetry-receiver, mcp-server]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          # Same path as release.yaml so the edge and released images sit side
          # by side under one package. metadata-action lowercases the owner.
          images: ghcr.io/${{ github.repository_owner }}/gameplane/${{ matrix.component }}
          tags: |
            type=raw,value=edge
            type=sha,prefix=sha-,format=short
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=edge-${{ github.sha }}
          cache-from: type=gha,scope=edge-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=edge-${{ matrix.component }}
      # Signing is mandatory for the official edge channel: fail the publish if
      # the key is absent rather than shipping unsigned images. The key has been
      # provisioned since module signing went live, so this never regresses a
      # real run — it only prevents a silently-unsigned one.
      - name: require signing key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -z "$COSIGN_PRIVATE_KEY" ]; then
            echo "::error::COSIGN_PRIVATE_KEY is required for edge image publishing"
            exit 1
          fi
      - name: install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.0.6'
      # Refresh the Sigstore TUF trust root so the runner has the CURRENT
      # public-good signing config — the Rekor v2 log key + timestamp authority.
      # cosign's baked-in root can still reference a decommissioned yearly Rekor
      # shard; without this, signing fails the Rekor-v2 TSA/checkpoint threshold
      # check ("accepted signatures do not match threshold, Found: 0").
      - name: refresh sigstore trust root
        run: cosign initialize
      # Keyed-sign the pushed image by digest AND record the signature in
      # Sigstore's public-good Rekor transparency log, so misuse of the project
      # key becomes publicly detectable.
      #
      # --use-signing-config=false selects cosign's legacy tlog-upload path
      # (classic Rekor) rather than the new Rekor v2 / signing-config flow. The
      # v2 flow additionally requires an RFC3161 TSA timestamp and a live yearly
      # log shard, and keyed signing to it currently fails cosign's post-sign
      # threshold self-check ("accepted signatures do not match threshold").
      # The legacy path needs no TSA and emits the classic bundle format that
      # existing `cosign verify` clients and the operator's cosign/v2 verifier
      # already understand. Bounded retry tolerates a transient Rekor blip; we
      # never fall back to an unlogged signature (strict verify below would fail
      # anyway).
      - name: sign image (keyed, logged)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          ref="ghcr.io/${owner_lc}/gameplane/${{ matrix.component }}@${DIGEST}"
          for attempt in 1 2 3; do
            if cosign sign --yes --key env://COSIGN_PRIVATE_KEY --use-signing-config=false "$ref"; then
              exit 0
            fi
            echo "::warning::cosign sign attempt ${attempt} failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::cosign sign failed after 3 attempts (Rekor unavailable?)"
          exit 1
      # Round-trip check: derive the public key from the signing secret and
      # strictly verify the signature just pushed — no --insecure-ignore-tlog, so
      # the Rekor inclusion evidence must be present. A corrupted key or a
      # sign/verify mismatch fails the publish instead of every user's `cosign
      # verify`. When cosign.pub is committed in the repo it must match the
      # derived key — a mismatch means the key was rotated without updating it.
      - name: verify signature & check published key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          cosign public-key --key env://COSIGN_PRIVATE_KEY --outfile "$RUNNER_TEMP/cosign.pub"
          cosign verify --key "$RUNNER_TEMP/cosign.pub" \
            "ghcr.io/${owner_lc}/gameplane/${{ matrix.component }}@${DIGEST}"
          if [ -f cosign.pub ] && ! cmp -s cosign.pub "$RUNNER_TEMP/cosign.pub"; then
            echo "::error::committed cosign.pub does not match COSIGN_PRIVATE_KEY — update the published key"
            exit 1
          fi
      # Surface the verification key (job summary + artifact) so publishing or
      # rotating the repo's cosign.pub never requires handling the private key
      # outside CI. One matrix leg is enough — the key is the same for all.
      - name: export public key
        if: matrix.component == 'operator'
        run: |
          {
            echo '### cosign public key'
            echo '```'
            cat "$RUNNER_TEMP/cosign.pub"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: upload public key artifact
        if: matrix.component == 'operator'
        uses: actions/upload-artifact@v4
        with:
          name: cosign-pub
          path: ${{ runner.temp }}/cosign.pub
