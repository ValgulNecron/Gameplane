name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  images:
    name: build & push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [operator, api, web, agent, audit-syslog-bridge, telemetry-receiver, mcp-server]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          # Images live UNDER the gameplane/ path segment so they match the
          # chart's default image.registry (ghcr.io/<owner>/gameplane) and the
          # Makefile REGISTRY. metadata-action lowercases the owner for us.
          images: ghcr.io/${{ github.repository_owner }}/gameplane/${{ matrix.component }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
      # Signing is mandatory for an official release: fail rather than publish
      # unsigned images. Mirrors publish-edge.yaml.
      - name: require signing key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -z "$COSIGN_PRIVATE_KEY" ]; then
            echo "::error::COSIGN_PRIVATE_KEY is required for official image publishing"
            exit 1
          fi
      - name: install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.0.6'
      # Refresh the Sigstore TUF trust root before signing (see publish-edge.yaml).
      - name: refresh sigstore trust root
        run: cosign initialize
      # Keyed-sign the released image by digest AND record it in the public Rekor
      # transparency log. --new-bundle-format=false --use-signing-config=false
      # selects the classic path (hashedrekord against rekor.sigstore.dev, no
      # TSA) — the format existing cosign clients and the operator's cosign/v2
      # verifier read. See publish-edge.yaml for the full rationale.
      - name: sign image (keyed, logged)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          ref="ghcr.io/${owner_lc}/gameplane/${{ matrix.component }}@${DIGEST}"
          for attempt in 1 2 3; do
            if cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
                --new-bundle-format=false --use-signing-config=false "$ref"; then
              exit 0
            fi
            echo "::warning::cosign sign attempt ${attempt} failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::cosign sign failed after 3 attempts (Rekor unavailable?)"
          exit 1
      # Round-trip check, mirroring publish-edge.yaml: strictly verify the
      # signature just pushed (no --insecure-ignore-tlog, so the Rekor evidence
      # must be present), and fail the release if the committed cosign.pub no
      # longer matches the signing key.
      - name: verify signature & check published key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          cosign public-key --key env://COSIGN_PRIVATE_KEY --outfile "$RUNNER_TEMP/cosign.pub"
          cosign verify --key "$RUNNER_TEMP/cosign.pub" --new-bundle-format=false \
            "ghcr.io/${owner_lc}/gameplane/${{ matrix.component }}@${DIGEST}"
          if [ -f cosign.pub ] && ! cmp -s cosign.pub "$RUNNER_TEMP/cosign.pub"; then
            echo "::error::committed cosign.pub does not match COSIGN_PRIVATE_KEY — update the published key"
            exit 1
          fi

  chart:
    name: package Helm chart
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: chart version
        run: |
          sed -i "s/^version: .*/version: ${GITHUB_REF_NAME#v}/" charts/gameplane/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: ${GITHUB_REF_NAME#v}/" charts/gameplane/Chart.yaml
      - name: helm package
        run: helm package charts/gameplane -d dist
      # The chart is a published artifact like the images, so it must be signed
      # too — it was previously pushed unsigned, which made the "everything we
      # publish is signed" claim untrue.
      - name: require signing key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -z "$COSIGN_PRIVATE_KEY" ]; then
            echo "::error::COSIGN_PRIVATE_KEY is required for official chart publishing"
            exit 1
          fi
      - name: install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.0.6'
      - name: refresh sigstore trust root
        run: cosign initialize
      - name: push to OCI
        id: push
        env:
          HELM_REGISTRY_CONFIG: ${{ runner.temp }}/helm.json
        run: |
          # OCI references must be lowercase; github.repository_owner keeps the
          # account's original casing (ValgulNecron), so fold it down.
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          # `helm push` prints "Digest: sha256:…" for the pushed chart manifest;
          # capture it so the signature covers the immutable digest, not a tag.
          out="$(helm push dist/gameplane-*.tgz "oci://ghcr.io/${owner_lc}/charts" 2>&1)"
          printf '%s\n' "$out"
          digest="$(printf '%s\n' "$out" | sed -n 's/^Digest: \(sha256:[0-9a-f]\{64\}\).*/\1/p' | head -n1)"
          if [ -z "$digest" ]; then
            echo "::error::could not parse the pushed chart digest from helm push output"
            exit 1
          fi
          echo "ref=ghcr.io/${owner_lc}/charts/gameplane@${digest}" >> "$GITHUB_OUTPUT"
      - name: sign chart (keyed, logged)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          REF: ${{ steps.push.outputs.ref }}
        run: |
          for attempt in 1 2 3; do
            if cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
                --new-bundle-format=false --use-signing-config=false "$REF"; then
              exit 0
            fi
            echo "::warning::cosign sign attempt ${attempt} failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::cosign sign failed after 3 attempts (Rekor unavailable?)"
          exit 1
      - name: verify chart signature
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          REF: ${{ steps.push.outputs.ref }}
        run: |
          cosign public-key --key env://COSIGN_PRIVATE_KEY --outfile "$RUNNER_TEMP/cosign.pub"
          cosign verify --key "$RUNNER_TEMP/cosign.pub" --new-bundle-format=false "$REF"

  # Publish the GitHub Release page for the tag, with the matching CHANGELOG
  # section as the notes. beta.3's page was created by hand and beta.4's was
  # forgotten entirely — this makes the page part of the release, not a
  # follow-up chore.
  github-release:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: [images, chart]
    steps:
      - uses: actions/checkout@v4
      - name: extract changelog section
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" '
            $0 ~ "^## \\[" ver "\\]" { on = 1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > notes.md
          if ! grep -q '[^[:space:]]' notes.md; then
            echo "::warning::no CHANGELOG section for ${GITHUB_REF_NAME#v} — falling back to generated notes"
            rm notes.md
          fi
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: re-running the workflow must not fail on an existing
          # release (and must not clobber hand-edited notes).
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — skipping"
            exit 0
          fi
          args=(--verify-tag --title "$GITHUB_REF_NAME")
          case "$GITHUB_REF_NAME" in
            *-*) args+=(--prerelease) ;;
          esac
          if [ -f notes.md ]; then
            args+=(--notes-file notes.md)
          else
            args+=(--generate-notes)
          fi
          # Ship the signature-verification key with the release once it is
          # committed in the repo.
          assets=()
          if [ -f cosign.pub ]; then assets=(cosign.pub); fi
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            "${args[@]}" "${assets[@]}"

  modules:
    name: push & sign module bundles
    runs-on: ubuntu-latest
    steps:
      # The module bundles live in the gameplane-module submodule at modules/,
      # so this job needs a recursive checkout to read their source. The
      # submodule is public, so the default GITHUB_TOKEN clones it (no PAT).
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # The signing key is optional: until the maintainer sets COSIGN_PRIVATE_KEY
      # the release still succeeds, it just skips publishing module bundles.
      # (secrets are not usable in `if:` conditions, so gate via a plain output.)
      - name: signing key present?
        id: gate
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -n "$COSIGN_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::COSIGN_PRIVATE_KEY not set — skipping module bundle push/sign."
          fi
      - name: install oras
        if: steps.gate.outputs.enabled == 'true'
        uses: oras-project/setup-oras@v1
      - name: install cosign
        if: steps.gate.outputs.enabled == 'true'
        uses: sigstore/cosign-installer@v3
        with:
          # Pin cosign v2: v3 dropped the offline-keyed `--tlog-upload=false`
          # flag the image/bundle signing uses (it now requires a signing-config).
          cosign-release: 'v2.4.3'
      - name: login to registry
        if: steps.gate.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: push & sign bundles
        if: steps.gate.outputs.enabled == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          modules/build.sh push \
            --registry "ghcr.io/${owner_lc}/gameplane-modules" \
            --sign --tag-latest
