name: republish-modules

# Manually re-push (and re-sign) the official game-module bundles to GHCR
# without cutting a release. release.yaml only publishes bundles on a `v*`
# tag, so an out-of-band fix to module metadata (e.g. a corrected
# gameplaneMinVersion) would otherwise wait for the next release. This
# workflow republishes exactly the bundles the superproject currently pins
# (submodule pointer) — bump the `modules/` pointer on main first if you want
# the latest module commits.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  modules:
    name: push & sign module bundles
    runs-on: ubuntu-latest
    steps:
      # The module bundles live in the gameplane-module submodule at modules/,
      # so this job needs a recursive checkout to read their source. The
      # submodule is public, so the default GITHUB_TOKEN clones it (no PAT).
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # The signing key is optional: without COSIGN_PRIVATE_KEY the run still
      # succeeds, it just skips publishing module bundles.
      # (secrets are not usable in `if:` conditions, so gate via a plain output.)
      - name: signing key present?
        id: gate
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -n "$COSIGN_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::COSIGN_PRIVATE_KEY not set — skipping module bundle push/sign."
          fi
      - name: install oras
        if: steps.gate.outputs.enabled == 'true'
        uses: oras-project/setup-oras@v1
      - name: install cosign
        if: steps.gate.outputs.enabled == 'true'
        uses: sigstore/cosign-installer@v3
        with:
          # Pin cosign v2: v3 dropped the offline-keyed `--tlog-upload=false`
          # flag the image/bundle signing uses (it now requires a signing-config).
          cosign-release: 'v2.4.3'
      - name: login to registry
        if: steps.gate.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: push & sign bundles
        if: steps.gate.outputs.enabled == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          modules/build.sh push \
            --registry "ghcr.io/${owner_lc}/gameplane-modules" \
            --sign --tag-latest
