name: ci

on:
  push:
    branches: [main]
    # Docs-only changes can't affect anything the suites test — don't spend
    # kind minutes on a markdown diff. Any non-ignored file in the change
    # set still triggers the full run. "website" (no slash) matches the
    # submodule gitlink itself — a plain submodule pointer bump; the /**
    # variant covers any future in-tree files under that path.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "design.pen"
      - "website"
      - "website/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "design.pen"
      - "website"
      - "website/**"
      - "LICENSE"

# Cancel superseded runs so rapid pushes to the same ref don't waste
# runner minutes on stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Lets the coverage steps publish a per-module commit status carrying
  # the measured %.
  statuses: write

# All jobs run on GitHub-hosted runners: each job gets its own isolated
# VM, so jobs never contend for memory or ports and there is nothing to
# serialize. The e2e suites are split into independent jobs, each with
# its own kind cluster, so the slowest suite — not the sum of all of
# them — sets the wall-clock time.
jobs:
  # Unit tests, envtest integration (operator/api), and the coverage
  # gate run in ONE job per module: the gate reads the profiles it just
  # produced, with no cross-job artifact hand-off.
  go:
    name: go (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        module: [netguard, gameaction, operator, api, agent, audit-syslog-bridge, telemetry-receiver, mcp-server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        # setup-go's built-in cache keys off a repo-root go.sum, which this
        # go.work workspace doesn't have — use an explicit per-module cache
        # instead so each matrix leg saves its own build cache.
        with: { go-version: "1.25", cache: false }
      - name: go module + build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ matrix.module }}-${{ hashFiles('**/go.sum', 'go.work.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ matrix.module }}-
      - name: go mod download
        working-directory: ${{ matrix.module }}
        run: go mod download
      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      # NOTE: -race is omitted on purpose to keep this job fast; coverage
      # uses -covermode=atomic, which is valid without -race. `make cover`
      # still runs -race for local/manual use.
      - name: unit test + coverage
        working-directory: ${{ matrix.module }}
        run: |
          mkdir -p coverage
          go test -covermode=atomic -coverpkg=./... \
            -coverprofile=coverage/unit.out ./...
      - name: envtest assets cache
        if: matrix.module == 'operator' || matrix.module == 'api'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/kubebuilder-envtest
          key: envtest-1.31.0-${{ runner.os }}
      - name: integration (envtest) test + coverage
        if: matrix.module == 'operator' || matrix.module == 'api'
        working-directory: ${{ matrix.module }}
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.19
          export KUBEBUILDER_ASSETS=$("$HOME"/go/bin/setup-envtest use 1.31.0 -p path)
          go test -tags=envtest -timeout 10m \
            -covermode=atomic -coverpkg=./... \
            -coverprofile=coverage/envtest.out ./...
      - name: merge profiles + threshold gate
        run: make cover-go-merge && make cover-go-check

  web:
    name: web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - run: npm run build
      - run: npm run test:cover
      - name: report coverage (commit status)
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          API_URL: ${{ github.api_url }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_SHA: ${{ github.sha }}
        run: |
          set +e
          [ -f coverage/coverage-summary.json ] || exit 0
          DESC=$(node -e "const t=require('./coverage/coverage-summary.json').total;console.log('L'+t.lines.pct+' S'+t.statements.pct+' B'+t.branches.pct+' F'+t.functions.pct)")
          SHA="$HEAD_SHA"; [ -z "$SHA" ] && SHA="$RUN_SHA"
          curl -sS -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" \
            "$API_URL/repos/$REPO/statuses/$SHA" \
            -d "{\"context\":\"coverage/web\",\"state\":\"success\",\"description\":\"$DESC\"}" >/dev/null || true
      - name: upload web coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: web/coverage
          retention-days: 7
          if-no-files-found: warn

  web-e2e-mock:
    name: web e2e (mock)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - name: playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
      - name: install chromium
        # Skips the browser download on a cache hit; still apt-installs deps.
        run: npx playwright install --with-deps chromium
      - name: playwright (mock)
        run: npm run test:e2e:mock
      - name: upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mock
          path: web/playwright-report
          retention-days: 7
          if-no-files-found: warn

  helm:
    name: helm lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/gameplane

  chart-template:
    name: chart render
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm template gameplane charts/gameplane > /tmp/rendered.yaml
      - name: sanity-check rendered manifests
        run: |
          grep -q 'kind: Deployment' /tmp/rendered.yaml
          grep -q 'kind: ClusterRole' /tmp/rendered.yaml
          grep -q 'kind: NetworkPolicy' /tmp/rendered.yaml

  # ---------------------------------------------------------------------
  # kind e2e — one job per suite, each with its own throwaway cluster on
  # its own VM. No `needs` edges: a broken unit test doesn't gate e2e
  # feedback, and the per-ref concurrency group above still cancels
  # superseded runs. VMs are discarded after the job, so there is no
  # teardown step and no cross-run cluster-name collision to guard.
  # Which tests run in which job is defined ONLY in test/e2e/buckets.sh;
  # the e2e-buckets job proves the buckets cover the whole suite.
  # ---------------------------------------------------------------------
  e2e-buckets:
    name: e2e bucket coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: verify buckets are disjoint + exhaustive
        run: ./test/e2e/buckets.sh verify

  e2e-go:
    name: e2e ${{ matrix.bucket }} (kind)
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.job_timeout }}
    strategy:
      fail-fast: false
      matrix:
        # Buckets are cut by login pressure, not feature area — see the
        # header comment in test/e2e/buckets.sh. The suite runs with
        # t.Parallel(); `parallel` bounds in-flight tests per bucket
        # (operator does zero logins and is wait-dominated, so it runs
        # wide; the api buckets stay within the login limiter's budget).
        include:
          - bucket: operator
            parallel: 8
            test_timeout: 20m
            job_timeout: 35
          - bucket: api-auth
            parallel: 4
            test_timeout: 15m
            job_timeout: 30
            tail: ratelimit
          - bucket: api-roles
            parallel: 3
            test_timeout: 10m
            job_timeout: 25
          - bucket: api-rbac
            parallel: 4
            test_timeout: 10m
            job_timeout: 25
          - bucket: api-agent
            parallel: 4
            test_timeout: 15m
            job_timeout: 30
          - bucket: api-mods
            parallel: 2
            test_timeout: 15m
            job_timeout: 30
    env:
      CLUSTER: gameplane-e2e
      CTX: kind-gameplane-e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25", cache: false }
      - name: go module + build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-e2e-${{ hashFiles('**/go.sum', 'go.work.sum') }}
          restore-keys: |
            go-${{ runner.os }}-e2e-
      - uses: azure/setup-helm@v4
      - name: install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: build images
        uses: ./.github/actions/e2e-images
      - name: bring up cluster + helm install
        run: ./deploy/kind/e2e.sh up "$CLUSTER" e2e
      - name: run go e2e (${{ matrix.bucket }})
        run: |
          RUN_REGEX="$(./test/e2e/buckets.sh regex '${{ matrix.bucket }}')"
          cd test/e2e && \
            GAMEPLANE_E2E_REUSE_CLUSTER=1 \
            GAMEPLANE_E2E_CLUSTER="$CLUSTER" \
            go test -tags=e2e -timeout ${{ matrix.test_timeout }} -v \
              -parallel ${{ matrix.parallel }} -run "$RUN_REGEX" ./...
      - name: run go e2e (ratelimit tail)
        # LAST on purpose: this test deliberately drains the shared per-IP
        # and per-username login buckets; anything running after it queues
        # behind the refill.
        if: matrix.tail == 'ratelimit'
        run: |
          RUN_REGEX="$(./test/e2e/buckets.sh regex ratelimit)"
          cd test/e2e && \
            GAMEPLANE_E2E_REUSE_CLUSTER=1 \
            GAMEPLANE_E2E_CLUSTER="$CLUSTER" \
            go test -tags=e2e -timeout 5m -v -run "$RUN_REGEX" ./...
      - name: dump cluster state on failure
        if: failure()
        run: |
          kubectl --context "$CTX" get all -A || true
          kubectl --context "$CTX" describe pods -n gameplane-system || true
          kubectl --context "$CTX" describe pods -n gameplane-games || true
          kubectl --context "$CTX" logs -n gameplane-system -l app.kubernetes.io/name=gameplane-operator --tail=200 || true
          # --previous catches the crash output if the operator restarted.
          kubectl --context "$CTX" logs -n gameplane-system -l app.kubernetes.io/name=gameplane-operator --previous --tail=200 || true
          kubectl --context "$CTX" logs -n gameplane-system -l app.kubernetes.io/name=gameplane-api --tail=200 || true

  # Dual-cluster ?cluster= dispatch + scoped RBAC (test/e2e/multicluster_e2e_test.go).
  # Split out from e2e-go: it's the only bucket that needs a SECOND kind
  # cluster (registered as a remote target via POST /clusters), so it gets
  # its own job rather than complicating the single-cluster matrix above.
  e2e-multicluster:
    name: e2e multicluster (kind x2)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLUSTER: gameplane-e2e
      CLUSTER_B: gameplane-e2e-b
      CTX: kind-gameplane-e2e
      CTX_B: kind-gameplane-e2e-b
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25", cache: false }
      - name: go module + build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-e2e-${{ hashFiles('**/go.sum', 'go.work.sum') }}
          restore-keys: |
            go-${{ runner.os }}-e2e-
      - uses: azure/setup-helm@v4
      - name: install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: build images
        uses: ./.github/actions/e2e-images
      - name: bring up cluster A + helm install
        run: ./deploy/kind/e2e.sh up "$CLUSTER" e2e
      - name: bring up cluster B + helm install
        # A second, fully independent kind cluster with the same chart
        # installed — it needs its own operator to reconcile the GameServer
        # this test dispatches to it. kind attaches every cluster's nodes to
        # the same docker bridge network ("kind"), so cluster A's api/
        # operator pods can reach cluster B's control-plane container by its
        # docker-network IP; see multicluster_e2e_test.go's package doc.
        run: ./deploy/kind/e2e.sh up "$CLUSTER_B" e2e
      - name: run go e2e (multicluster)
        run: |
          RUN_REGEX="$(./test/e2e/buckets.sh regex multicluster)"
          cd test/e2e && \
            GAMEPLANE_E2E_REUSE_CLUSTER=1 \
            GAMEPLANE_E2E_CLUSTER="$CLUSTER" \
            GAMEPLANE_E2E_CLUSTER_B="$CLUSTER_B" \
            go test -tags=e2e -timeout 15m -v -run "$RUN_REGEX" ./...
      - name: dump cluster state on failure
        if: failure()
        run: |
          kubectl --context "$CTX" get all -A || true
          kubectl --context "$CTX_B" get all -A || true
          kubectl --context "$CTX" describe pods -n gameplane-system || true
          kubectl --context "$CTX_B" describe pods -n gameplane-system || true
          kubectl --context "$CTX" logs -n gameplane-system -l app.kubernetes.io/name=gameplane-api --tail=200 || true
          kubectl --context "$CTX" logs -n gameplane-system -l app.kubernetes.io/name=gameplane-operator --tail=200 || true
          kubectl --context "$CTX_B" logs -n gameplane-system -l app.kubernetes.io/name=gameplane-operator --tail=200 || true

  e2e-web-live:
    name: e2e web live (kind)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLUSTER: gameplane-e2e
      CTX: kind-gameplane-e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25", cache: false }
      - name: go module + build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-e2e-${{ hashFiles('**/go.sum', 'go.work.sum') }}
          restore-keys: |
            go-${{ runner.os }}-e2e-
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - uses: azure/setup-helm@v4
      - name: install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: build images
        uses: ./.github/actions/e2e-images
        with:
          # Exactly one e2e job writes the shared layer cache back; the
          # others only read it. This is the shortest job, so it absorbs
          # the export upload without touching the critical path.
          export-cache: "true"
      - name: bring up cluster + helm install
        run: ./deploy/kind/e2e.sh up "$CLUSTER" e2e
      - name: bootstrap admin
        # Playwright's live-mode globalSetup (web/e2e/globalSetup.ts) reads
        # the admin password from test/e2e/.tmp/admin-password, which this
        # test writes.
        run: |
          cd test/e2e && \
            GAMEPLANE_E2E_REUSE_CLUSTER=1 \
            GAMEPLANE_E2E_CLUSTER="$CLUSTER" \
            go test -tags=e2e -timeout 5m -v -run '^TestAPI_BootstrapAndLogin$' ./...
      - name: playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
      - name: install playwright browser
        run: |
          cd web && npm ci && npx playwright install --with-deps chromium
      - name: run playwright (live)
        env:
          GAMEPLANE_E2E_TARGET: live
          GAMEPLANE_E2E_CLUSTER: ${{ env.CLUSTER }}
        run: |
          cd web && npm run test:e2e:live
      - name: dump cluster state on failure
        if: failure()
        run: |
          kubectl --context "$CTX" get all -A || true
          kubectl --context "$CTX" describe pods -n gameplane-system || true
          kubectl --context "$CTX" logs -n gameplane-system -l app.kubernetes.io/name=gameplane-api --tail=200 || true
      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-live
          path: web/playwright-report
          retention-days: 7
          if-no-files-found: warn

  e2e-game-bot:
    name: e2e game bot (kind)
    runs-on: ubuntu-latest
    # Two serial real-game boots (Minecraft, then Terraria — deliberately
    # not parallel: two game servers booting at once OOM-starve the node).
    timeout-minutes: 50
    env:
      CLUSTER: gameplane-e2e
      CTX: kind-gameplane-e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25", cache: false }
      - name: go module + build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-e2e-${{ hashFiles('**/go.sum', 'go.work.sum') }}
          restore-keys: |
            go-${{ runner.os }}-e2e-
      - uses: azure/setup-helm@v4
      - name: install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: build images
        uses: ./.github/actions/e2e-images
      - name: build game-bot probe image
        # Only this job needs the probe, so it lives outside the "e2e" bake
        # group. deploy/kind/e2e.sh side-loads it into the cluster when present.
        run: docker buildx bake -f docker-bake.hcl --load e2e-gameprobe
      - name: bring up cluster + helm install
        run: ./deploy/kind/e2e.sh up "$CLUSTER" e2e
      - name: run go e2e (game bot)
        # Blocking. The bot runs as a Job inside the cluster and dials the game
        # Service directly, removing the `kubectl port-forward` hop this job's
        # flakiness was once blamed on. (That blame turned out to be wrong: the
        # real failures were a too-long bot username and a drifted Terraria image
        # tag, both fixed. The in-cluster harness is still what exercises the
        # network path a real client uses.)
        run: |
          RUN_REGEX="$(./test/e2e/buckets.sh regex bot)"
          cd test/e2e && \
            GAMEPLANE_E2E_REUSE_CLUSTER=1 \
            GAMEPLANE_E2E_CLUSTER="$CLUSTER" \
            GAMEPLANE_E2E_GAME_BOT=1 \
            go test -tags=e2e -timeout 30m -v -run "$RUN_REGEX" ./...
      - name: dump cluster state on failure
        if: failure()
        run: |
          kubectl --context "$CTX" get all -A || true
          kubectl --context "$CTX" describe pods -n gameplane-system || true
          kubectl --context "$CTX" describe pods -n gameplane-games || true
          kubectl --context "$CTX" logs -n gameplane-system -l app.kubernetes.io/name=gameplane-operator --tail=200 || true
          kubectl --context "$CTX" logs -n gameplane-system -l app.kubernetes.io/name=gameplane-api --tail=200 || true
