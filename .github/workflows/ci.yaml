name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [netguard, operator, api, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: Cache modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: go mod download
        working-directory: ${{ matrix.module }}
        run: go mod download
      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: go test (unit + coverage)
        working-directory: ${{ matrix.module }}
        run: |
          mkdir -p coverage
          go test -race -covermode=atomic -coverpkg=./... \
            -coverprofile=coverage/unit.out ./...
      - name: upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage/unit.out
          retention-days: 7
          if-no-files-found: error

  integration:
    name: integration (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: [go]
    strategy:
      fail-fast: false
      matrix:
        module: [operator, api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: Cache modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
      - name: fetch envtest binaries
        run: |
          echo "KUBEBUILDER_ASSETS=$($HOME/go/bin/setup-envtest use 1.31.0 -p path)" >> $GITHUB_ENV
      - name: integration test (envtest + coverage)
        working-directory: ${{ matrix.module }}
        run: |
          mkdir -p coverage
          go test -race -tags=envtest -timeout 10m \
            -covermode=atomic -coverpkg=./... \
            -coverprofile=coverage/envtest.out ./...
      - name: upload envtest coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-envtest-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage/envtest.out
          retention-days: 7
          if-no-files-found: error

  coverage-go:
    name: coverage gate (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: [go, integration]
    # Don't gate the build on a coverage flake when one of the upstream jobs
    # is allowed to skip (e.g., agent has no integration job).
    if: always() && needs.go.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        module: [netguard, operator, api, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage
      - name: download envtest coverage (operator/api only)
        if: matrix.module != 'agent' && matrix.module != 'netguard'
        # If integration failed, the artifact won't exist — that's its own
        # red signal in CI. Tolerate it here and gate on unit-only data.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-envtest-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage
      - name: merge profiles
        run: make cover-go-merge
      - name: threshold check
        run: make cover-go-check

  web:
    name: web
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - run: npm run build
      - run: npm run test:cover
      - name: upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: web/coverage
          retention-days: 7
          if-no-files-found: warn

  web-e2e-mock:
    name: web e2e (mock)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - name: install chromium
        run: npx playwright install --with-deps chromium
      - name: playwright (mock)
        run: npm run test:e2e:mock
      - name: upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mock
          path: web/playwright-report
          retention-days: 7
          if-no-files-found: warn

  helm:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/kestrel

  chart-template:
    name: chart render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm template kestrel charts/kestrel > /tmp/rendered.yaml
      - name: sanity-check rendered manifests
        run: |
          grep -q 'kind: Deployment' /tmp/rendered.yaml
          grep -q 'kind: ClusterRole' /tmp/rendered.yaml
          grep -q 'kind: NetworkPolicy' /tmp/rendered.yaml

  # The e2e suite is split into two parallel kind clusters so the
  # combined Go runtime stays under the per-job budget. e2e-core covers
  # helm install + GameServer/RBAC/auth/agent/CRD validation and runs
  # the live Playwright spec; e2e-extended covers the slower restic-
  # backed Backup/Restore/Module/BackupSchedule/WS/finalizer suites.
  # Each spins its own cluster (~3 min setup); in exchange wall-clock
  # drops from sequential to parallel.
  e2e-core:
    name: e2e core (kind)
    runs-on: ubuntu-latest
    needs: [go, helm]
    timeout-minutes: 26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - uses: azure/setup-helm@v4
      - name: install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: build images
        run: make e2e-images
      - name: bring up cluster + helm install
        run: ./deploy/kind/e2e.sh up kestrel-e2e e2e
      - name: run go e2e (core)
        run: |
          # Anchored ^(...)$ list — prefix-matching (e.g. TestGameServer vs
          # TestGameServer_Cascading) would silently run tests in both buckets.
          RUN_REGEX='^('
          RUN_REGEX+='TestHelmInstall_AllPodsReady|'
          RUN_REGEX+='TestHelmInstall_AllCRDsPresent|'
          RUN_REGEX+='TestHelmInstall_APIHealthz|'
          RUN_REGEX+='TestHelmInstall_APILogsClean|'
          RUN_REGEX+='TestHelmInstall_OperatorLogsClean|'
          RUN_REGEX+='TestCRD_Validation_GameServerWithoutTemplate|'
          RUN_REGEX+='TestCRD_Validation_BackupScheduleBadCron|'
          RUN_REGEX+='TestCRD_Validation_BackupRequiresServerRef|'
          RUN_REGEX+='TestCRD_Validation_GameTemplateRequiresImage|'
          RUN_REGEX+='TestGameServer_OperatorMaterializesChildren|'
          RUN_REGEX+='TestGameServer_SuspendScalesToZeroAndBack|'
          RUN_REGEX+='TestAPI_BootstrapAndLogin|'
          RUN_REGEX+='TestAPI_LoginPrivacy|'
          RUN_REGEX+='TestAPI_AuditEmitsOnMutation|'
          RUN_REGEX+='TestAPI_RBAC_ViewerCannotMutate|'
          RUN_REGEX+='TestAPI_RBAC_ViewerCannotMutate_Matrix|'
          RUN_REGEX+='TestAPI_RBAC_OperatorCanWriteServers_NotUsers|'
          RUN_REGEX+='TestAPI_RBAC_AdminCanReachAll|'
          RUN_REGEX+='TestAPI_OperatorCannotInviteUsers|'
          RUN_REGEX+='TestAPI_LifecycleStartStop|'
          RUN_REGEX+='TestAPI_LifecycleRestart|'
          RUN_REGEX+='TestAPI_LifecycleClone|'
          RUN_REGEX+='TestAPI_LifecycleNotFound|'
          RUN_REGEX+='TestAPI_AgentFilesRoundTrip|'
          RUN_REGEX+='TestAPI_AgentPlayers|'
          RUN_REGEX+='TestAPI_AgentUnreachable'
          RUN_REGEX+=')$'
          cd test/e2e && \
            KESTREL_E2E_REUSE_CLUSTER=1 \
            KESTREL_E2E_CLUSTER=kestrel-e2e \
            KESTREL_E2E_KEEP_ON_FAILURE=1 \
            go test -tags=e2e -timeout 19m -v -run "$RUN_REGEX" ./...
      - name: install playwright browser
        run: |
          cd web && npm ci && npx playwright install --with-deps chromium
      - name: run playwright (live)
        env:
          KESTREL_E2E_TARGET: live
          KESTREL_E2E_CLUSTER: kestrel-e2e
        run: |
          cd web && npm run test:e2e:live
      - name: dump cluster state on failure
        if: failure()
        run: |
          kubectl get all -A
          kubectl describe pods -n kestrel-system
          kubectl logs -n kestrel-system -l app.kubernetes.io/name=kestrel-operator --tail=200 || true
          kubectl logs -n kestrel-system -l app.kubernetes.io/name=kestrel-api --tail=200 || true
      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-live-core
          path: web/playwright-report
          retention-days: 7
          if-no-files-found: warn
      - name: tear down
        if: always()
        run: ./deploy/kind/e2e.sh down kestrel-e2e || true

  e2e-extended:
    name: e2e extended (kind)
    runs-on: ubuntu-latest
    needs: [go, helm]
    timeout-minutes: 32
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - uses: azure/setup-helm@v4
      - name: install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: build images
        run: make e2e-images
      - name: bring up cluster + helm install
        run: ./deploy/kind/e2e.sh up kestrel-e2e-2 e2e
      - name: run go e2e (extended)
        run: |
          # Anchored ^(...)$ list — must stay disjoint from e2e-core.
          RUN_REGEX='^('
          RUN_REGEX+='TestGameServer_PVCSurvivesPodDelete|'
          RUN_REGEX+='TestGameServer_CascadingDelete|'
          RUN_REGEX+='TestGameTemplate_DeletionWithLiveServer|'
          RUN_REGEX+='TestModule_FinalizerBlocksWhileTemplateInUse|'
          RUN_REGEX+='TestModule_FailsOnUnreachableRegistry|'
          RUN_REGEX+='TestModuleSourceAndModule|'
          RUN_REGEX+='TestBackup_OperatorMaterializesJob|'
          RUN_REGEX+='TestBackup_FailsOnMissingPVC|'
          RUN_REGEX+='TestBackup_FailsOnBadCredentials|'
          RUN_REGEX+='TestBackupSchedule_CreatesBackupCR|'
          RUN_REGEX+='TestBackupSchedule_SuspendStopsScheduling|'
          RUN_REGEX+='TestBackupSchedule_RetentionTrimsPast|'
          RUN_REGEX+='TestBackupSchedule_ConcurrencyForbid|'
          RUN_REGEX+='TestRestore_RoundTrip|'
          RUN_REGEX+='TestRestore_RejectsMissingBackup|'
          RUN_REGEX+='TestRestore_FailsOnMissingSnapshot|'
          RUN_REGEX+='TestAPI_PasswordResetInvalidatesSession|'
          RUN_REGEX+='TestAPI_LoginRateLimit|'
          RUN_REGEX+='TestAPI_AuditPaginationAndFilter|'
          RUN_REGEX+='TestAPI_LogoutInvalidatesSession|'
          RUN_REGEX+='TestAPI_ConsolePTYRoundTrip|'
          RUN_REGEX+='TestAPI_LogsTailWS'
          RUN_REGEX+=')$'
          cd test/e2e && \
            KESTREL_E2E_REUSE_CLUSTER=1 \
            KESTREL_E2E_CLUSTER=kestrel-e2e-2 \
            KESTREL_E2E_KEEP_ON_FAILURE=1 \
            go test -tags=e2e -timeout 26m -v -run "$RUN_REGEX" ./...
      - name: dump cluster state on failure
        if: failure()
        run: |
          kubectl --context kind-kestrel-e2e-2 get all -A || true
          kubectl --context kind-kestrel-e2e-2 describe pods -n kestrel-system || true
          kubectl --context kind-kestrel-e2e-2 logs -n kestrel-system -l app.kubernetes.io/name=kestrel-operator --tail=200 || true
          kubectl --context kind-kestrel-e2e-2 logs -n kestrel-system -l app.kubernetes.io/name=kestrel-api --tail=200 || true
      - name: tear down
        if: always()
        run: ./deploy/kind/e2e.sh down kestrel-e2e-2 || true
