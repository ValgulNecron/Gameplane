name: ci

on:
  push:
    branches: [main]
  pull_request:

# One self-hosted runner: cancel superseded runs so rapid pushes don't
# stack overlapping runs and starve the heavy jobs (go -race, chromium).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Lets the coverage steps publish a per-module commit status carrying the
  # measured % (readable via the API, since this runner has no artifact
  # backend and job logs need a web session).
  statuses: write

jobs:
  # Unit tests, envtest integration (operator/api), and the coverage
  # gate run in ONE job per module. Folding them together removes the
  # cross-job artifact hand-off (upload/download-artifact), which the
  # self-hosted Forgejo runner's artifact backend doesn't support — the
  # gate now reads the profiles it just produced, on the same runner.
  go:
    name: go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        module: [netguard, operator, api, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: go mod download
        working-directory: ${{ matrix.module }}
        run: go mod download
      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      # NOTE: -race is omitted on purpose. It multiplies memory use several-
      # fold and OOM-kills the larger modules on the memory-constrained
      # self-hosted runner (netguard passes, operator/api/agent get killed).
      # Coverage uses -covermode=atomic, which is valid without -race.
      # Restore -race (or a separate race-only job) once the runner has more RAM.
      - name: unit test + coverage
        working-directory: ${{ matrix.module }}
        run: |
          mkdir -p coverage
          go test -covermode=atomic -coverpkg=./... \
            -coverprofile=coverage/unit.out ./...
      - name: integration (envtest) test + coverage
        if: matrix.module == 'operator' || matrix.module == 'api'
        working-directory: ${{ matrix.module }}
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          export KUBEBUILDER_ASSETS=$("$HOME"/go/bin/setup-envtest use 1.31.0 -p path)
          go test -tags=envtest -timeout 10m \
            -covermode=atomic -coverpkg=./... \
            -coverprofile=coverage/envtest.out ./...
      - name: merge profiles + threshold gate
        run: make cover-go-merge && make cover-go-check

  web:
    name: web
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - run: npm run build
      - run: npm run test:cover
      - name: report coverage (commit status)
        if: always()
        continue-on-error: true
        env:
          GJ_TOKEN: ${{ github.token }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_SHA: ${{ github.sha }}
        run: |
          set +e
          [ -f coverage/coverage-summary.json ] || exit 0
          DESC=$(node -e "const t=require('./coverage/coverage-summary.json').total;console.log('L'+t.lines.pct+' S'+t.statements.pct+' B'+t.branches.pct+' F'+t.functions.pct)")
          SHA="$HEAD_SHA"; [ -z "$SHA" ] && SHA="$RUN_SHA"
          curl -sS -X POST -H "Authorization: token $GJ_TOKEN" -H "Content-Type: application/json" \
            "$SERVER/api/v1/repos/$REPO/statuses/$SHA" \
            -d "{\"context\":\"coverage/web\",\"state\":\"success\",\"description\":\"$DESC\"}" >/dev/null || true
      - name: upload web coverage
        # Best-effort: the vitest thresholds in the step above are the gate.
        # Don't fail the job if the runner's artifact backend is unavailable.
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: web/coverage
          retention-days: 7
          if-no-files-found: warn

  web-e2e-mock:
    name: web e2e (mock)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - name: install chromium
        run: npx playwright install --with-deps chromium
      - name: free dev-server port (clear vite leaked by a cancelled run)
        run: |
          # CI sets reuseExistingServer:false, so Playwright aborts if :5173
          # is taken. On this non-ephemeral runner a vite orphaned by a
          # cancel-in-progress run can still hold it. Killing a free port is a
          # no-op, so this is safe to run unconditionally.
          (command -v fuser >/dev/null && fuser -k 5173/tcp) 2>/dev/null || true
          (command -v lsof  >/dev/null && lsof -ti tcp:5173 | xargs -r kill -9) 2>/dev/null || true
          pkill -f 'vite.*5173' 2>/dev/null || true
          true
      - name: playwright (mock)
        run: npm run test:e2e:mock
      - name: upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mock
          path: web/playwright-report
          retention-days: 7
          if-no-files-found: warn

  helm:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/kestrel

  chart-template:
    name: chart render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm template kestrel charts/kestrel > /tmp/rendered.yaml
      - name: sanity-check rendered manifests
        run: |
          grep -q 'kind: Deployment' /tmp/rendered.yaml
          grep -q 'kind: ClusterRole' /tmp/rendered.yaml
          grep -q 'kind: NetworkPolicy' /tmp/rendered.yaml

  # The e2e suite is split into two parallel kind clusters so the
  # combined Go runtime stays under the per-job budget. e2e-core covers
  # helm install + GameServer/RBAC/auth/agent/CRD validation and runs
  # the live Playwright spec; e2e-extended covers the slower restic-
  # backed Backup/Restore/Module/BackupSchedule/WS/finalizer suites.
  # Each spins its own cluster (~3 min setup); in exchange wall-clock
  # drops from sequential to parallel.
  e2e-core:
    name: e2e core (kind)
    runs-on: ubuntu-latest
    needs: [go, helm]
    timeout-minutes: 26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - uses: azure/setup-helm@v4
      - name: install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: build images
        run: make e2e-images
      - name: bring up cluster + helm install
        run: ./deploy/kind/e2e.sh up kestrel-e2e e2e
      - name: run go e2e (core)
        run: |
          # Anchored ^(...)$ list — prefix-matching (e.g. TestGameServer vs
          # TestGameServer_Cascading) would silently run tests in both buckets.
          RUN_REGEX='^('
          RUN_REGEX+='TestHelmInstall_AllPodsReady|'
          RUN_REGEX+='TestHelmInstall_AllCRDsPresent|'
          RUN_REGEX+='TestHelmInstall_APIHealthz|'
          RUN_REGEX+='TestHelmInstall_APILogsClean|'
          RUN_REGEX+='TestHelmInstall_OperatorLogsClean|'
          RUN_REGEX+='TestCRD_Validation_GameServerWithoutTemplate|'
          RUN_REGEX+='TestCRD_Validation_BackupScheduleBadCron|'
          RUN_REGEX+='TestCRD_Validation_BackupRequiresServerRef|'
          RUN_REGEX+='TestCRD_Validation_GameTemplateRequiresImage|'
          RUN_REGEX+='TestGameServer_OperatorMaterializesChildren|'
          RUN_REGEX+='TestGameServer_SuspendScalesToZeroAndBack|'
          RUN_REGEX+='TestAPI_BootstrapAndLogin|'
          RUN_REGEX+='TestAPI_LoginPrivacy|'
          RUN_REGEX+='TestAPI_AuditEmitsOnMutation|'
          RUN_REGEX+='TestAPI_RBAC_ViewerCannotMutate|'
          RUN_REGEX+='TestAPI_RBAC_ViewerCannotMutate_Matrix|'
          RUN_REGEX+='TestAPI_RBAC_OperatorCanWriteServers_NotUsers|'
          RUN_REGEX+='TestAPI_RBAC_AdminCanReachAll|'
          RUN_REGEX+='TestAPI_OperatorCannotInviteUsers|'
          RUN_REGEX+='TestAPI_LifecycleStartStop|'
          RUN_REGEX+='TestAPI_LifecycleRestart|'
          RUN_REGEX+='TestAPI_LifecycleClone|'
          RUN_REGEX+='TestAPI_LifecycleNotFound|'
          RUN_REGEX+='TestAPI_AgentFilesRoundTrip|'
          RUN_REGEX+='TestAPI_AgentPlayers|'
          RUN_REGEX+='TestAPI_AgentUnreachable'
          RUN_REGEX+=')$'
          cd test/e2e && \
            KESTREL_E2E_REUSE_CLUSTER=1 \
            KESTREL_E2E_CLUSTER=kestrel-e2e \
            KESTREL_E2E_KEEP_ON_FAILURE=1 \
            go test -tags=e2e -timeout 19m -v -run "$RUN_REGEX" ./...
      - name: install playwright browser
        run: |
          cd web && npm ci && npx playwright install --with-deps chromium
      - name: free dev-server port (clear vite leaked by a cancelled run)
        run: |
          # CI sets reuseExistingServer:false, so Playwright aborts if :5173
          # is taken. On this non-ephemeral runner a vite orphaned by a
          # cancel-in-progress run can still hold it. Killing a free port is a
          # no-op, so this is safe to run unconditionally.
          (command -v fuser >/dev/null && fuser -k 5173/tcp) 2>/dev/null || true
          (command -v lsof  >/dev/null && lsof -ti tcp:5173 | xargs -r kill -9) 2>/dev/null || true
          pkill -f 'vite.*5173' 2>/dev/null || true
          true
      - name: run playwright (live)
        env:
          KESTREL_E2E_TARGET: live
          KESTREL_E2E_CLUSTER: kestrel-e2e
        run: |
          cd web && npm run test:e2e:live
      - name: dump cluster state on failure
        if: failure()
        run: |
          kubectl get all -A
          kubectl describe pods -n kestrel-system
          kubectl logs -n kestrel-system -l app.kubernetes.io/name=kestrel-operator --tail=200 || true
          kubectl logs -n kestrel-system -l app.kubernetes.io/name=kestrel-api --tail=200 || true
      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-live-core
          path: web/playwright-report
          retention-days: 7
          if-no-files-found: warn
      - name: tear down
        if: always()
        run: ./deploy/kind/e2e.sh down kestrel-e2e || true

  e2e-extended:
    name: e2e extended (kind)
    runs-on: ubuntu-latest
    # Serialized after e2e-core: the memory-limited self-hosted runner OOM-kills
    # a kind apiserver when both e2e jobs bring up clusters concurrently.
    needs: [go, helm, e2e-core]
    timeout-minutes: 32
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - uses: azure/setup-helm@v4
      - name: install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: build images
        run: make e2e-images
      - name: bring up cluster + helm install
        run: ./deploy/kind/e2e.sh up kestrel-e2e-2 e2e
      - name: run go e2e (extended)
        run: |
          # Anchored ^(...)$ list — must stay disjoint from e2e-core.
          RUN_REGEX='^('
          RUN_REGEX+='TestGameServer_PVCSurvivesPodDelete|'
          RUN_REGEX+='TestGameServer_CascadingDelete|'
          RUN_REGEX+='TestGameTemplate_DeletionWithLiveServer|'
          RUN_REGEX+='TestModule_FinalizerBlocksWhileTemplateInUse|'
          RUN_REGEX+='TestModule_FailsOnUnreachableRegistry|'
          RUN_REGEX+='TestModule_VerifyRejectsUnsignedBundle|'
          RUN_REGEX+='TestModuleSource_RejectsSSRFTarget|'
          RUN_REGEX+='TestModuleSourceAndModule|'
          RUN_REGEX+='TestBackup_OperatorMaterializesJob|'
          RUN_REGEX+='TestBackup_FailsOnMissingPVC|'
          RUN_REGEX+='TestBackup_FailsOnBadCredentials|'
          RUN_REGEX+='TestBackupSchedule_CreatesBackupCR|'
          RUN_REGEX+='TestBackupSchedule_SuspendStopsScheduling|'
          RUN_REGEX+='TestBackupSchedule_RetentionTrimsPast|'
          RUN_REGEX+='TestBackupSchedule_ConcurrencyForbid|'
          RUN_REGEX+='TestRestore_RoundTrip|'
          RUN_REGEX+='TestRestore_RejectsMissingBackup|'
          RUN_REGEX+='TestRestore_FailsOnMissingSnapshot|'
          RUN_REGEX+='TestAPI_PasswordResetInvalidatesSession|'
          RUN_REGEX+='TestAPI_LoginRateLimit|'
          RUN_REGEX+='TestAPI_AuditPaginationAndFilter|'
          RUN_REGEX+='TestAPI_LogoutInvalidatesSession|'
          RUN_REGEX+='TestAPI_ConsolePTYRoundTrip|'
          RUN_REGEX+='TestAPI_LogsTailWS'
          RUN_REGEX+=')$'
          cd test/e2e && \
            KESTREL_E2E_REUSE_CLUSTER=1 \
            KESTREL_E2E_CLUSTER=kestrel-e2e-2 \
            KESTREL_E2E_KEEP_ON_FAILURE=1 \
            go test -tags=e2e -timeout 26m -v -run "$RUN_REGEX" ./...
      - name: dump cluster state on failure
        if: failure()
        run: |
          kubectl --context kind-kestrel-e2e-2 get all -A || true
          kubectl --context kind-kestrel-e2e-2 describe pods -n kestrel-system || true
          kubectl --context kind-kestrel-e2e-2 logs -n kestrel-system -l app.kubernetes.io/name=kestrel-operator --tail=200 || true
          kubectl --context kind-kestrel-e2e-2 logs -n kestrel-system -l app.kubernetes.io/name=kestrel-api --tail=200 || true
      - name: tear down
        if: always()
        run: ./deploy/kind/e2e.sh down kestrel-e2e-2 || true

  # Boots a REAL Minecraft server through the operator and connects a headless
  # protocol bot (mcbot) that pings it and completes a login — proving the
  # server is genuinely playable. Heavier than the other e2e jobs (pulls the
  # itzg image + runs a JVM), so it's gated behind KESTREL_E2E_GAME_BOT and
  # serialized last: the memory-limited runner OOM-kills a kind apiserver when
  # multiple e2e clusters run concurrently.
  e2e-game-bot:
    name: e2e game bot (kind)
    runs-on: ubuntu-latest
    needs: [go, helm, e2e-core, e2e-extended]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - uses: azure/setup-helm@v4
      - name: install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: build images
        run: make e2e-images
      - name: bring up cluster + helm install
        run: ./deploy/kind/e2e.sh up kestrel-e2e-3 e2e
      - name: run go e2e (game bot)
        run: |
          cd test/e2e && \
            KESTREL_E2E_REUSE_CLUSTER=1 \
            KESTREL_E2E_CLUSTER=kestrel-e2e-3 \
            KESTREL_E2E_GAME_BOT=1 \
            KESTREL_E2E_KEEP_ON_FAILURE=1 \
            go test -tags=e2e -timeout 18m -v -run '^TestGameServer_MinecraftBotConnects$' ./...
      - name: dump cluster state on failure
        if: failure()
        run: |
          kubectl --context kind-kestrel-e2e-3 get all -A || true
          kubectl --context kind-kestrel-e2e-3 describe pods -n kestrel-games || true
          kubectl --context kind-kestrel-e2e-3 logs -n kestrel-games e2e-mc-bot-0 -c game --tail=200 || true
          kubectl --context kind-kestrel-e2e-3 logs -n kestrel-system -l app.kubernetes.io/name=kestrel-operator --tail=200 || true
      - name: tear down
        if: always()
        run: ./deploy/kind/e2e.sh down kestrel-e2e-3 || true
