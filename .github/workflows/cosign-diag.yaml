name: cosign-diag

# TEMPORARY: cross-sign the NEW ECDSA public key (rotate/new-cosign.pub) with the
# OLD Ed25519 key that currently lives in COSIGN_PRIVATE_KEY, using cosign v2.4.3
# (v2.6.3/v3 panic on Ed25519 sign-blob). Uploads the detached signature as an
# artifact. Offline (no Rekor). DELETE before merging Phase 1.
on:
  push:
    branches: [ci/rekor-edge-images]
    paths: ['.github/workflows/cosign-diag.yaml', 'rotate/new-cosign.pub']

permissions:
  contents: read

jobs:
  crosssign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install cosign v2.4.3
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.3'
      - name: cross-sign the NEW pub with the OLD key (offline)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY --tlog-upload=false \
            --output-signature cosign.pub.legacy-sig \
            rotate/new-cosign.pub
          echo "=== cross-signature (base64) ==="
          cat cosign.pub.legacy-sig; echo
      - name: derive OLD pub + self-verify the cross-signature
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          cosign public-key --key env://COSIGN_PRIVATE_KEY --outfile cosign-legacy.pub
          cosign verify-blob --key cosign-legacy.pub --insecure-ignore-tlog \
            --signature cosign.pub.legacy-sig rotate/new-cosign.pub && echo "SELF-VERIFY: OK"
          echo "=== old public key ==="; cat cosign-legacy.pub
      - name: upload cross-signature + old pub
        uses: actions/upload-artifact@v4
        with:
          name: rotation-artifacts
          path: |
            cosign.pub.legacy-sig
            cosign-legacy.pub
