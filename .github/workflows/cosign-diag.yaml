name: cosign-diag

# TEMPORARY diagnostic: validate the offline cross-sign ceremony (old Ed25519
# key signs the new key) using cosign v2.6.3 — v3 has Ed25519 sign/verify
# regressions, but v2 (what the current pipeline already uses) handles it.
# Runs in seconds, uses the CURRENT key in secrets, offline (no Rekor).
# DELETE before merging Phase 1.
on:
  push:
    branches: [ci/rekor-edge-images]
    paths: ['.github/workflows/cosign-diag.yaml']

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: install cosign v2.6.3
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.6.3'
      - name: version
        run: cosign version
      - name: simulate the NEW public key file
        run: |
          printf -- '-----BEGIN PUBLIC KEY-----\n(stand-in for the new ECDSA cosign.pub)\n-----END PUBLIC KEY-----\n' > cosign.pub.new
      # Old Ed25519 key signs the new key file, OFFLINE. Classic v2 flags.
      - name: cross-sign the new key with the OLD key (offline, cosign v2)
        continue-on-error: true
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -x
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY --tlog-upload=false \
            --output-signature cosign.pub.new.legacy-sig \
            cosign.pub.new && echo "CROSS-SIGN: OK"
          echo "--- signature (base64) ---"; cat cosign.pub.new.legacy-sig; echo
      - name: derive the OLD public key
        continue-on-error: true
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: cosign public-key --key env://COSIGN_PRIVATE_KEY --outfile cosign-legacy.pub && cat cosign-legacy.pub
      - name: verify cross-signature with OLD public key (offline)
        continue-on-error: true
        run: |
          set -x
          cosign verify-blob --key cosign-legacy.pub --insecure-ignore-tlog \
            --signature cosign.pub.new.legacy-sig \
            cosign.pub.new && echo "VERIFY: OK"
