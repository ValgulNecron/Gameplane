name: cosign-diag

# TEMPORARY diagnostic: validate the offline cross-sign ceremony commands (old
# key signs the new key) before handing the maintainer a runbook. Runs in
# seconds, no image build, uses the CURRENT key already in secrets. Offline
# (no Rekor), so the Ed25519/Rekor hash issue does not apply here.
# DELETE before merging Phase 1.
on:
  push:
    branches: [ci/rekor-edge-images]
    paths: ['.github/workflows/cosign-diag.yaml']

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.0.6'
      - name: version
        run: cosign version
      - name: simulate the NEW public key file
        run: echo "-----BEGIN PUBLIC KEY-----\n(stand-in for the new ECDSA cosign.pub)\n-----END PUBLIC KEY-----" > cosign.pub.new
      # Old key signs the new key file, OFFLINE (no tlog). The Ed25519 key
      # panics on the classic --new-bundle-format=false path
      # ("crypto: requested hash function #0 is unavailable"), so use the new
      # bundle format (--bundle). --tlog-upload=false requires
      # --use-signing-config=false on v3.
      - name: cross-sign the new key with the OLD key (offline)
        id: crosssign
        continue-on-error: true
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -x
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY \
            --tlog-upload=false --use-signing-config=false \
            --bundle cosign.pub.new.legacy-bundle.json \
            cosign.pub.new && echo "CROSS-SIGN: OK"
          echo "--- bundle ---"; cat cosign.pub.new.legacy-bundle.json; echo
      - name: derive the OLD public key
        continue-on-error: true
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: cosign public-key --key env://COSIGN_PRIVATE_KEY --outfile cosign-legacy.pub && cat cosign-legacy.pub
      # Verify the cross-signature with the old PUBLIC key, as any downstream
      # user would. Offline (ignore tlog).
      - name: verify cross-signature with OLD public key
        continue-on-error: true
        run: |
          set -x
          cosign verify-blob --key cosign-legacy.pub \
            --insecure-ignore-tlog \
            --bundle cosign.pub.new.legacy-bundle.json \
            cosign.pub.new && echo "VERIFY: OK"
