name: cosign-diag

# TEMPORARY diagnostic: does an OLDER cosign sign-blob the Ed25519 key without
# the "hash function #0" panic? If yes, the one-time cross-sign is a trivial
# offline cosign command and its raw Ed25519 signature is openssl-verifiable.
# Uses the CURRENT key in secrets, offline. DELETE before merging Phase 1.
on:
  push:
    branches: [ci/rekor-edge-images]
    paths: ['.github/workflows/cosign-diag.yaml']

permissions:
  contents: read

jobs:
  trycosign:
    strategy:
      fail-fast: false
      matrix:
        ver: ['v2.4.3', 'v2.2.4', 'v2.0.2']
    runs-on: ubuntu-latest
    steps:
      - name: install cosign ${{ matrix.ver }}
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: ${{ matrix.ver }}
      - name: simulate the NEW public key file
        run: printf 'stand-in for the new ECDSA cosign.pub\n' > cosign.pub.new
      - name: sign-blob with OLD Ed25519 key (offline)
        continue-on-error: true
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -x
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY --tlog-upload=false \
            --output-signature sig.b64 cosign.pub.new && echo "SIGN ${{ matrix.ver }}: OK"
          cat sig.b64; echo
      - name: derive old pub + verify (offline)
        continue-on-error: true
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          set -x
          cosign public-key --key env://COSIGN_PRIVATE_KEY --outfile cosign-legacy.pub
          cosign verify-blob --key cosign-legacy.pub --insecure-ignore-tlog \
            --signature sig.b64 cosign.pub.new && echo "VERIFY ${{ matrix.ver }}: OK"
      # If cosign works, prove the SAME signature is openssl-verifiable (raw Ed25519).
      - name: openssl verify the same signature
        continue-on-error: true
        run: |
          set -x
          base64 -d sig.b64 > sig.bin
          openssl pkeyutl -verify -pubin -inkey cosign-legacy.pub -rawin \
            -in cosign.pub.new -sigfile sig.bin && echo "OPENSSL ${{ matrix.ver }}: OK"
