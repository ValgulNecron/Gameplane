# Coverage threshold gate for the audit-syslog-bridge module.
# Enforced by `make cover-go-check` via go-test-coverage/v2.
#
# The bridge is a small, pure-stdlib HTTP-JSON → RFC 5424 syslog relay. The
# tests cover the syslog framing, config validation, the HTTP handler (TCP/UDP
# forward, auth, method/body errors, forward failure), and the reconnecting
# forwarder. The uncovered remainder is main()/run() process wiring
# (ListenAndServe + signal handling), which isn't unit-testable. Gate below
# measured; ratchet up as coverage grows.
profile: coverage/unit.out
github-action-output: false

threshold:
  file: 0
  package: 0
  total: 70
